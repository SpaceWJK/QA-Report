<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그래서, AX가 대체 뭔데!?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<style>
:root{
  --bg:#f7f4ed; --ink:#1a1612; --body:#332920;
  --mute:#6e6456;            /* t-responsive 원본 #7a7062을 소형 본문 WCAG 4.5:1 충족 위해 조정 */
  --accent:#b8503a;          /* 대형 텍스트·보더·배경 틴트 전용 (3:1 기준 충족) */
  --accent-dk:#96432f;       /* 소형 라벨(eyebrow/th/번호) 전용 — 4.5:1 확보 */
  --rule:#d4c8b3;
  --surface:#ece6d8;
  --good:#3a6b4f; --warn:#9a6a1f; --bad:#8a2a2a;
  --frame:#11100e; --frame-text:#efece6; --frame-mute:#9e9384;
  --serif:'Newsreader',Georgia,'Times New Roman',serif;
  --sans:'Pretendard Variable','Pretendard','Inter',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--frame);color:var(--ink);font-family:var(--sans);font-size:16.5px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow:hidden;word-break:keep-all;overflow-wrap:break-word;}
.deck{position:fixed;inset:0;display:flex;flex-direction:column;}
.stage{flex:1;position:relative;overflow:hidden;}
.progress{position:absolute;top:0;left:0;height:2px;background:var(--accent);transition:width .4s;z-index:5;}
.track{display:flex;height:100%;transition:transform .5s cubic-bezier(.7,0,.2,1);}
.slide{min-width:100%;height:100%;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column;justify-content:center;padding:42px 6vw 64px;animation:fadeUp .55s ease both;}
.nowrap{display:inline-block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion: reduce){.slide{animation:none}.track{transition:none}}

.s-band{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--rule);padding-bottom:9px;margin-bottom:22px;}
.s-band .brand{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--accent-dk);}
.s-band .sec{font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);}
.eyebrow{display:block;font-size:13px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--accent-dk);margin-bottom:12px;}
h2.title{font-family:var(--serif);font-weight:700;font-size:clamp(25px,2.9vw,38px);line-height:1.18;margin-bottom:17px;}
h2.title em{font-style:italic;color:var(--accent);}
.lead{font-size:17.5px;line-height:1.66;color:var(--body);max-width:74ch;border-left:3px solid var(--accent);padding-left:16px;margin-bottom:18px;}
p{font-size:17px;line-height:1.65;margin-bottom:10px;color:var(--body);max-width:80ch;}
strong{color:var(--ink);font-weight:700;}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:0 36px;align-items:start;}
.cols3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 26px;align-items:start;}
@media(max-width:900px){.cols,.cols3{grid-template-columns:1fr;gap:18px 0;}}
h3{font-family:var(--serif);font-size:19px;font-weight:600;margin:14px 0 7px;}
h4{font-size:15px;font-weight:700;color:var(--accent-dk);margin:0 0 8px;letter-spacing:.02em;}
ul{list-style:none;margin:0 0 12px;}
li{position:relative;padding-left:18px;margin-bottom:8px;font-size:17px;line-height:1.55;color:var(--body);}
li::before{content:'—';position:absolute;left:0;color:var(--accent);}
table{width:100%;border-collapse:collapse;margin:0 0 13px;font-size:15.5px;}
th{text-align:left;font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:var(--mute);font-weight:700;border-bottom:1.5px solid var(--ink);padding:8px 10px;}
th.acc{color:var(--accent-dk);}
td{padding:8px 10px;border-bottom:1px solid var(--rule);color:var(--body);vertical-align:top;line-height:1.5;}
td:first-child{color:var(--ink);font-weight:600;white-space:nowrap;}
tr:hover td{background:var(--surface);}
.note{border-left:3px solid var(--accent);background:rgba(184,80,58,.06);padding:12px 16px;font-size:15px;line-height:1.55;margin:8px 0 0;color:var(--body);}
.note.warn{border-color:var(--warn);background:rgba(154,106,31,.08);}
.codeblk{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:15px;background:#26221d;color:#e8e2d8;padding:15px 19px;border-radius:5px;margin:6px 0;white-space:pre;overflow-x:auto;overflow-y:visible;flex-shrink:0;line-height:1.62;}
.idx{columns:2;column-gap:40px;}
@media(max-width:900px){.idx{columns:1;}}
.idx .row{break-inside:avoid;display:flex;gap:11px;padding:7px 0;border-bottom:1px solid var(--rule);align-items:baseline;cursor:pointer;}
.idx .row:hover{background:var(--surface);}
.idx .row .nn{font-family:var(--serif);font-style:italic;color:var(--accent-dk);font-size:15px;min-width:26px;}
.idx .row .tt{font-size:15.5px;color:var(--body);}
.step{border-top:3px solid var(--accent);padding-top:14px;}
.step .n{font-family:var(--serif);font-style:italic;color:var(--accent-dk);font-size:28px;display:block;margin-bottom:6px;}
.cols3-lg{gap:24px 30px;}
.cols3-lg h4{font-size:16.5px;}
.pivot{margin-top:44px;padding-top:26px;font-family:var(--serif);font-weight:600;font-size:clamp(26px,3.6vw,42px);line-height:1.32;color:var(--ink);}
.pivot em{font-style:italic;color:var(--accent);}
.pivot .cap{display:block;font-family:var(--sans);font-weight:400;font-size:15px;color:var(--mute);margin-top:12px;}
.condcard{border-top:3px solid var(--accent);padding-top:14px;}
.condcard .ex{font-size:14.5px;line-height:1.5;color:var(--mute);border-top:1px solid var(--rule);margin-top:14px;padding-top:11px;}
.chips-lg .chip{font-size:19px;padding:9px 22px;}
.pullquote{font-family:var(--serif);font-style:italic;font-weight:600;font-size:clamp(24px,3.2vw,34px);line-height:1.42;color:var(--ink);border-left:3px solid var(--accent);padding:2px 0 2px 22px;margin:22px 0 4px;max-width:68ch;}
.pullquote em{color:var(--accent);}
.col-neg{border-left:3px solid var(--bad);padding-left:14px;}
.col-pos{border-left:3px solid var(--good);padding-left:14px;}
.chips{display:flex;flex-wrap:wrap;gap:8px 10px;margin:4px 0 14px;}
.chip{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink);border:1px solid var(--rule);border-radius:20px;padding:5px 14px;background:var(--surface);}
.credit{margin-top:auto;padding-top:22px;font-size:15px;color:var(--mute);text-align:right;}

.art{display:block;max-width:100%;height:auto;border:1px solid var(--rule);}
.art-cover{max-height:172px;width:auto;margin:0 auto 22px;}
.art-side{max-width:280px;}
.art-wide{max-width:400px;max-height:195px;object-fit:contain;margin:2px 0 4px;}
figure{margin:0;}
figcaption{font-size:13px;color:var(--mute);margin-top:6px;}

.flow4{display:flex;align-items:center;flex-wrap:wrap;gap:4px 8px;margin:2px 0 16px;}
.fnode{font-family:var(--serif);font-style:italic;font-size:16.5px;border:1.5px solid var(--rule);border-radius:20px;padding:6px 16px;color:var(--ink);background:var(--bg);}
.fnode.is-now{border-color:var(--accent);color:var(--accent-dk);font-weight:700;}
.farrow{color:var(--mute);font-size:16px;}
@media(max-width:900px){.flow4{gap:4px}}

.jcurve-wrap{margin:2px 0 4px;max-width:640px;}
.jcurve-wrap svg{display:block;width:100%;height:auto;max-height:150px;}

/* 슬라이드 9 전용 — 기업명 필 태그 대체 (인라인 텍스트 + 얇은 밑줄) */
.co-list{font-family:var(--serif);font-style:italic;font-size:19px;color:var(--ink);display:inline-block;align-self:flex-start;border-bottom:1px solid var(--accent);padding-bottom:5px;margin:4px 0 16px;}

/* 슬라이드 10 전용 — 좌측 표 첫 행과 우측 일러스트 상단 정렬 */
.debt-grid img{margin-top:22px;}

/* 슬라이드 15 전용 — 좌측 텍스트 블록을 우측 일러스트 세로 중앙에 정렬 */
.org-grid{align-items:center;}

/* 슬라이드 16 전용 — 다크 솔리드 박스 대신 테라코타 세로 보더 콜아웃 (.codeblk와 분리) */
.nightlog{border-left:4px solid var(--accent);padding:2px 0 2px 20px;margin:4px 0;}
.nightlog .lbl{font-family:var(--serif);font-style:italic;font-weight:600;font-size:16px;color:var(--accent-dk);margin-bottom:10px;}
.nightlog ul{margin:0 0 10px;}
.nightlog .num{color:var(--accent-dk);font-weight:700;font-size:17.5px;}
.nightlog .foot{font-size:14.5px;color:var(--mute);border-top:1px solid var(--rule);padding-top:9px;}

.cover{justify-content:center;background:radial-gradient(120% 90% at 80% 12%,#ece6d8 0%,var(--bg) 55%);}
.cover .kick{font-size:15.5px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-dk);margin-bottom:30px;}
.cover h1{font-family:var(--serif);font-weight:700;font-size:clamp(44px,8vw,98px);line-height:1.05;letter-spacing:-.015em;margin-bottom:28px;}
.cover h1 .it{font-style:italic;color:var(--accent);}
.cover .sub{font-size:22px;color:var(--mute);max-width:52ch;margin-bottom:52px;line-height:1.58;}
.cover .meta{display:flex;gap:44px;border-top:1px solid var(--rule);padding-top:22px;flex-wrap:wrap;}
.cover .meta .l{font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:var(--mute);margin-bottom:4px;}
.cover .meta .v{font-size:18px;font-weight:600;color:var(--ink);}

.controls{height:60px;background:var(--frame);border-top:1px solid #2a2722;display:flex;align-items:center;padding:0 18px;gap:14px;color:var(--frame-mute);}
.controls .ttl{font-size:13px;letter-spacing:.05em;color:var(--frame-mute);flex:1;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.controls .pager{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--frame-text);min-width:60px;text-align:right;}
.controls button{width:44px;height:44px;border:1px solid #3a3631;background:transparent;color:var(--frame-text);font-size:19px;cursor:pointer;border-radius:50%;transition:background .15s,border-color .15s;}
.controls button:hover:not(:disabled){background:var(--accent);border-color:var(--accent);}
.controls button:disabled{opacity:.3;cursor:not-allowed;}
.hint{position:fixed;bottom:68px;right:16px;font-size:13px;color:var(--frame-mute);}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
@media(max-width:900px){.slide{padding:30px 5vw 56px;}.hint{display:none;}}
@media(max-width:480px){.art-wide{max-height:150px;}.art-cover{max-height:120px;}.codeblk{white-space:pre-wrap;font-size:13.5px;}}
</style>
</head>
<body>
<div class="deck">
  <div class="stage"><div class="progress" id="prog" role="progressbar" aria-valuemin="0" aria-valuemax="100"></div><div class="track" id="track"></div></div>
  <div class="controls">
    <div class="ttl" id="ttl"></div>
    <button id="first" onclick="go(0)" aria-label="첫 슬라이드로">«</button>
    <button id="prev" onclick="move(-1)" aria-label="이전 슬라이드">‹</button>
    <div class="pager"><span id="cur">1</span> / <span id="tot"></span></div>
    <button id="next" onclick="move(1)" aria-label="다음 슬라이드">›</button>
    <button id="last" onclick="go(S.length-1)" aria-label="마지막 슬라이드로">»</button>
  </div>
</div>
<div class="hint">← → 키 이동 · 목차 클릭 이동</div>
<script>
const S=[];function add(t,h){S.push({t,h});}
function band(sec){return `<div class="s-band"><span class="brand">AX 도입 가이드</span><span class="sec">${sec}</span></div>`;}

/* 1 표지 */
add("표지",`<div class="slide cover">
  <div class="kick">AI가 좋다는 건 이제 다들 안다.</div>
  <h1>그래서, <span class="it">AX가 대체 뭔데!?</span></h1>
  <div class="sub">뭐가 좋다는 건지, 뭘 어떻게 하라는 건지 — 속 시원하게 정리했습니다.</div>
  <div class="meta">
    <div><div class="l">구성</div><div class="v">4막 · 18장</div></div>
    <div><div class="l">Written by</div><div class="v">Woozi</div></div>
  </div>
</div>`);

/* 2 목차 */
add("목차",`<div class="slide">
  <span class="eyebrow">목차</span>
  <h2 class="title">이 가이드가 <em>다루는 순서</em></h2>
  <div class="idx" id="toc"></div>
  <div class="note">1막 방향은 옳다 → 2막 왜 기대만큼 안 되는가 → 3막 그래서, 순서가 있다 → 4막 그 끝에 있는 것.</div>
</div>`);

/* 2.5 AX가 뭐길래? */
add("AX가 뭐길래?",`<div class="slide">
  ${band("Act 0 · What Is AX")}
  <span class="eyebrow">본격적으로 들어가기 전에 · AX가 뭐길래?</span>
  <h2 class="title">AX는 도구가 아니라 <em>일하는 방식</em>을 바꾸는 것</h2>
  <div class="lead">한 줄 정의 — <strong>AX(AI Transformation)</strong>는 "AI 도구를 사주는 것"(구독·계정 지급)이 아니라, "일하는 <span class="nowrap">방식 자체를</span> AI와 함께 다시 짜는 것"입니다.</div>
  <div class="cols">
    <div class="col-neg">
      <h4>도구 도입 — AX 아님</h4>
      <ul>
        <li>AI 서비스를 구독하고 계정을 나눠줍니다.</li>
        <li>기존 업무 틀은 그대로 두고, 그 위에 도구만 하나 더 얹습니다.</li>
      </ul>
    </div>
    <div class="col-pos">
      <h4>방식 전환 — 진짜 AX</h4>
      <ul>
        <li>일이 오가는 경로(입력과 출력) 자체를 다시 설계합니다.</li>
        <li>일하는 순서, 역할 분담, 검증 방식까지 함께 바꿉니다.</li>
      </ul>
    </div>
  </div>
  <div class="note">비유하자면 — DX(디지털 전환)가 "종이 문서를 시스템으로" 바꿔 도구를 바꾼 단계였다면, AX는 그다음 단계로 일의 구조 자체를 바꿉니다.</div>
</div>`);

/* 3 되돌릴 수 없는 변화 */
add("되돌릴 수 없는 변화",`<div class="slide">
  ${band("Act 1 · No Way Back")}
  <span class="eyebrow">1막. 맞습니다, AI는 사야 합니다 · 되돌릴 수 없는 변화</span>
  <h2 class="title">라이터를 알아버린 사람은 <em>부싯돌로 못 돌아갑니다</em></h2>
  <img class="art art-wide" src="assets/lighter-flint.png" alt="왼쪽은 부싯돌을 부딪혀 불꽃을 내려는 손, 오른쪽은 라이터로 손쉽게 불을 켠 손을 나란히 비교한 일러스트">
  <div class="cols">
    <div>
      <h4>비유 하나</h4>
      <ul>
        <li>손으로 나무를 비벼 불을 붙이던 사람도, 라이터를 한 번 써 보면 다시 부싯돌로 <span class="nowrap">돌아가지 못합니다.</span></li>
        <li>AI로 일해 본 사람도 마찬가지입니다 — 한 번 편한 걸 알면, 이전 방식으로는 <span class="nowrap">못 돌아갑니다.</span></li>
      </ul>
    </div>
    <div>
      <h4>지금 우리 주변에서</h4>
      <ul>
        <li>회사와 사회 전체에서 이미 변화가 진행 중입니다.</li>
        <li>AI로 생산성을 크게 올릴 수 있다는 걸 다들 알면서도, 예전 방식만 쓰는 게 오히려 <span class="nowrap">불안한 분위기입니다</span> — 개인도 조직도 똑같이 이 조바심(FOMO)을 느낍니다.</li>
      </ul>
    </div>
  </div>
  <div class="note">그래서 이 가이드의 출발점은 "도입해야 하나 말아야 하나"가 아니라 "어떻게 해야 제대로 되나"입니다. 방향 자체는 이미 옳습니다.</div>
</div>`);

/* 4 우리가 흔히 하는 기대 */
add("우리가 흔히 하는 기대",`<div class="slide">
  ${band("Act 1 · The Common Expectation")}
  <span class="eyebrow">1막. 맞습니다, AI는 사야 합니다 · 우리가 흔히 하는 기대</span>
  <h2 class="title">계정 주면 → 생산성 오르고 → <em>비용도 준다?</em></h2>
  <div class="cols3 cols3-lg">
    <div class="step"><span class="n">01</span><h4>계정 지급</h4><p>여러 곳에서 잘 알려진 AI 도구를 회사 전체에 도입합니다.</p></div>
    <div class="step"><span class="n">02</span><h4>교육 · 전담팀 구성</h4><p>외부 강사를 불러 교육하고, 사내에 AI 전담팀(TF)을 만듭니다.</p></div>
    <div class="step"><span class="n">03</span><h4>기대하는 결과</h4><p>이만큼 했으니 생산성은 오르고, 비용은 자연히 줄어들 거라 기대합니다.</p></div>
  </div>
  <div class="pivot">이 기대, <em>어디서부터 어긋나는 걸까요?</em><span class="cap">2막에서 그 이유를 하나씩 짚어봅니다.</span></div>
</div>`);

/* 5 모두가 겪는 5단계 */
add("모두가 겪는 5단계",`<div class="slide">
  ${band("Act 2 · The Common Stages")}
  <span class="eyebrow">2막. 왜 다들 기대만큼 안 되는가 · 모두가 겪는 5단계</span>
  <h2 class="title">환호에서 의구심까지, <em>패턴은 비슷합니다</em></h2>
  <div class="flow4" role="img" aria-label="환호에서 정체, 신남을 거쳐 의구심으로 이어지는 4단계 흐름">
    <div class="fnode">환호</div><span class="farrow">→</span>
    <div class="fnode">정체</div><span class="farrow">→</span>
    <div class="fnode">신남</div><span class="farrow">→</span>
    <div class="fnode is-now">의구심</div>
  </div>

function josaRo(word){
  const last=word.trim().slice(-1);
  const code=last.charCodeAt(0)-0xAC00;
  if(code<0||code>11171)return '로';
  const jong=code%28;
  return (jong===0||jong===8)?'로':'으로';
}
const track=document.getElementById('track');
track.innerHTML=S.map(s=>s.h).join('');
document.getElementById('tot').textContent=S.length;
const toc=document.getElementById('toc');
if(toc){toc.innerHTML=S.map((s,idx)=>idx<2?'':`<div class="row" onclick="go(${idx})" tabindex="0" role="button" aria-label="${s.t}${josaRo(s.t)} 이동" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();go(${idx});}"><span class="nn">${String(idx-1).padStart(2,'0')}</span><span class="tt">${s.t}</span></div>`).join('');}
let i=0;
function r(){
  track.style.transform=`translateX(-${i*100}%)`;
  document.getElementById('cur').textContent=i+1;
  document.getElementById('ttl').textContent=S[i].t;
  document.getElementById('prev').disabled=i===0;
  document.getElementById('next').disabled=i===S.length-1;
  document.getElementById('first').disabled=i===0;
  document.getElementById('last').disabled=i===S.length-1;
  const pct=((i+1)/S.length*100);
  const prog=document.getElementById('prog');
  prog.style.width=pct+'%';
  prog.setAttribute('aria-valuenow',Math.round(pct));
  const sl=track.children[i]; if(sl) sl.scrollTop=0;
}
function move(d){const n=i+d; if(n>=0&&n<S.length){i=n;r();}}
function go(n){if(n>=0&&n<S.length){i=n;r();}}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown')move(1);
  else if(e.key==='ArrowLeft'||e.key==='PageUp')move(-1);
  else if(e.key==='Home'){i=0;r();}
  else if(e.key==='End'){i=S.length-1;r();}
});
r();
</script>
