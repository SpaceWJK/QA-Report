<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple / Google 마켓 프로세스 표준화 가이드 — 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<style>
:root{
  --paper:#efece6; --ink:#1c1815; --mute:#7a716a; --wine:#7a1f2b; --line:#c9c2b8; --surface:#e8e4dc;
  --apple:#1c1815; --google:#7a1f2b;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--ink);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;overflow:hidden;}

/* deck */
.deck{position:fixed;inset:0;display:flex;flex-direction:column;background:#11100e;}
.stage{flex:1;position:relative;overflow:hidden;}
.track{display:flex;height:100%;transition:transform .5s cubic-bezier(.7,0,.2,1);}
.slide{min-width:100%;height:100%;overflow-y:auto;background:var(--paper);
  display:flex;flex-direction:column;padding:48px 7vw 64px;position:relative;}
.slide::-webkit-scrollbar{width:8px;} .slide::-webkit-scrollbar-thumb{background:var(--line);}

/* header band per slide */
.s-band{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:30px;}
.s-band .brand{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--wine);}
.s-band .sec{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);}

.eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--wine);margin-bottom:14px;}
h1.title{font-family:var(--serif);font-weight:700;font-size:clamp(30px,4.4vw,52px);line-height:1.08;letter-spacing:-.01em;margin-bottom:18px;}
h1.title span{color:var(--wine);font-style:italic;}
h2.title{font-family:var(--serif);font-weight:700;font-size:clamp(24px,3.2vw,38px);line-height:1.12;margin-bottom:20px;}
h2.title em{font-style:italic;color:var(--wine);}
.deck-lead{font-size:17px;line-height:1.7;color:#3a342e;max-width:60ch;border-left:3px solid var(--wine);padding-left:18px;margin-bottom:26px;}
p{margin-bottom:12px;color:#3a342e;max-width:74ch;}
strong{color:var(--ink);font-weight:700;}

.cols{display:grid;grid-template-columns:1fr 1fr;gap:0 44px;}
.cols-3{display:grid;grid-template-columns:repeat(3,1fr);gap:0 32px;}
@media(max-width:900px){.cols,.cols-3{grid-template-columns:1fr;}}

h3{font-family:var(--serif);font-size:19px;font-weight:600;margin:18px 0 8px;color:var(--ink);}
h3 .num{color:var(--wine);font-style:italic;margin-right:8px;}
ul{list-style:none;margin:6px 0 14px;}
li{position:relative;padding-left:18px;margin-bottom:7px;font-size:14px;color:#3a342e;line-height:1.6;}
li::before{content:'—';position:absolute;left:0;color:var(--wine);}
ol{margin:6px 0 14px 0;padding-left:20px;} ol li{padding-left:4px;} ol li::before{content:none;}

.chip{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 9px;border:1px solid var(--line);color:var(--mute);border-radius:999px;margin-left:8px;vertical-align:middle;}
.chip.new{border-color:var(--wine);color:var(--wine);background:rgba(122,31,43,.06);}
.chip.apple{border-color:var(--ink);color:var(--ink);}
.chip.google{border-color:var(--wine);color:var(--wine);}

table{width:100%;border-collapse:collapse;margin:10px 0 16px;font-size:13px;}
th{text-align:left;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mute);font-weight:700;border-bottom:1.5px solid var(--ink);padding:9px 12px;}
td{padding:9px 12px;border-bottom:1px solid var(--line);color:#3a342e;vertical-align:top;}
td:first-child{color:var(--ink);font-weight:600;}
tr:hover td{background:var(--surface);}

.card{background:var(--surface);border:1px solid var(--line);padding:18px 20px;margin-bottom:14px;}
.card .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--wine);font-weight:700;margin-bottom:6px;}
.note{border-left:3px solid var(--wine);background:rgba(122,31,43,.05);padding:12px 16px;font-size:13px;color:#3a342e;margin:12px 0;}
.warn{border-left:3px solid #b45309;background:rgba(180,83,9,.06);padding:12px 16px;font-size:13px;margin:12px 0;}

.flow{display:flex;align-items:stretch;gap:0;border:1px solid var(--line);margin:14px 0;overflow:hidden;flex-wrap:wrap;}
.flow .step{flex:1;min-width:130px;padding:12px 14px;border-right:1px solid var(--line);background:var(--paper);}
.flow .step:last-child{border-right:none;}
.flow .step .n{font-family:var(--serif);font-style:italic;color:var(--wine);font-size:13px;}
.flow .step .t{font-size:13px;font-weight:600;margin-top:2px;}
.flow .step .d{font-size:11px;color:var(--mute);margin-top:3px;}

/* cover */
.cover{justify-content:center;align-items:flex-start;background:
  radial-gradient(120% 90% at 80% 10%, #e8e4dc 0%, var(--paper) 55%);}
.cover .kicker{font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--wine);margin-bottom:26px;}
.cover h1{font-family:var(--serif);font-weight:700;font-size:clamp(40px,7vw,86px);line-height:1.0;letter-spacing:-.02em;margin-bottom:22px;}
.cover h1 .it{font-style:italic;color:var(--wine);}
.cover .sub{font-size:19px;color:var(--mute);max-width:54ch;margin-bottom:40px;}
.cover .meta{display:flex;gap:40px;border-top:1px solid var(--line);padding-top:20px;flex-wrap:wrap;}
.cover .meta div .l{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);}
.cover .meta div .v{font-size:15px;font-weight:600;}

/* index */
.toc{columns:2;column-gap:48px;margin-top:6px;}
@media(max-width:900px){.toc{columns:1;}}
.toc .row{break-inside:avoid;display:flex;gap:14px;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer;align-items:baseline;}
.toc .row:hover .nm{color:var(--wine);}
.toc .row .no{font-family:var(--serif);font-style:italic;color:var(--wine);width:32px;flex-shrink:0;}
.toc .row .nm{font-size:15px;font-weight:600;}
.toc .row .gp{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin-left:auto;}

/* controls */
.controls{height:62px;background:#11100e;border-top:1px solid #2a2722;display:flex;align-items:center;padding:0 22px;gap:18px;color:#cfc7bd;}
.controls .pager{font-family:var(--serif);font-style:italic;font-size:15px;color:#efece6;min-width:74px;}
.controls .nav-btn{width:38px;height:38px;border:1px solid #3a3631;background:transparent;color:#efece6;font-size:16px;cursor:pointer;border-radius:50%;transition:.15s;display:flex;align-items:center;justify-content:center;}
.controls .nav-btn:hover{background:var(--wine);border-color:var(--wine);}
.controls .nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.controls .ttl{font-size:12px;letter-spacing:.06em;color:#8c857c;flex:1;text-align:center;text-transform:uppercase;}
.controls .toc-btn{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#cfc7bd;background:none;border:1px solid #3a3631;padding:8px 12px;cursor:pointer;}
.controls .toc-btn:hover{border-color:var(--wine);color:#fff;}
.progress{position:absolute;top:0;left:0;height:2px;background:var(--wine);transition:width .4s;}
.hint{position:fixed;bottom:74px;right:18px;font-size:11px;color:#6f6860;letter-spacing:.05em;}
</style>
</head>
<body>
<div class="deck">
  <div class="stage">
    <div class="progress" id="prog"></div>
    <div class="track" id="track"><!-- SLIDES --></div>
  </div>
  <div class="controls">
    <button class="toc-btn" onclick="go(1)">목차</button>
    <div class="ttl" id="ttl">Cover</div>
    <button class="nav-btn" id="prev" onclick="move(-1)">‹</button>
    <div class="pager"><span id="cur">1</span> / <span id="tot">0</span></div>
    <button class="nav-btn" id="next" onclick="move(1)">›</button>
  </div>
</div>
<div class="hint">← → 키로 페이지 이동</div>

<script>
const SLIDES = [];
function S(title, html){ SLIDES.push({title, html}); }

/* 1 COVER */
S("Cover", `<div class="slide cover">
  <div class="kicker">SGP 퍼블리싱QA · 실행과제 표준화 가이드</div>
  <h1>Apple / Google<br><span class="it">마켓 프로세스 표준화</span></h1>
  <div class="sub">출시 품질 Gate와 연계된 마켓 제출·검수·반려 예방 표준 운영 가이드. 2026년 현행 App Store Connect / Google Play Console 기준으로 갱신.</div>
  <div class="meta">
    <div><div class="l">버전</div><div class="v">v1.0 · 2026.06</div></div>
    <div><div class="l">소관</div><div class="v">퍼블리싱QA 1·2팀</div></div>
    <div><div class="l">대상 마켓</div><div class="v">Apple · Google (+멀티스토어)</div></div>
    <div><div class="l">분류</div><div class="v">Internal</div></div>
  </div>
</div>`);

/* 2 INDEX */
S("목차", `<div class="slide">
  <div class="s-band"><span class="brand">Market Process Standard</span><span class="sec">Index</span></div>
  <span class="eyebrow">목차</span>
  <h2 class="title">이 문서가 <em>다루는 것</em></h2>
  <div class="toc" id="toc"></div>
</div>`);

/* 3 OVERVIEW */
S("개요", `<div class="slide">
  <div class="s-band"><span class="brand">Market Process Standard</span><span class="sec">00 · Overview</span></div>
  <span class="eyebrow">과제 정의</span>
  <h2 class="title">왜 <em>표준화</em>인가</h2>
  <div class="deck-lead">담당자가 바뀌어도 동일 품질로 제출·검수·대응이 가능한 단계별 SOP와 반려 예방 플레이북을 수립한다.</div>
  <div class="cols">
    <div>
      <h3><span class="num">·</span>배경</h3>
      <ul>
        <li>프로젝트·조직별 상이한 마켓 제출 기준 → 혼선·재작업</li>
        <li>마켓/스토어 검수 실패가 출시 일정 리스크로 직결</li>
        <li>Apple·Google 정책 수시 변경 → 미반영 시 반려</li>
      </ul>
      <h3><span class="num">·</span>범위</h3>
      <ul>
        <li>Apple App Store Connect 제출·검수·피처드</li>
        <li>Google Play Console 제출·테스트 트랙·검수</li>
        <li>반려 사례 대응·예방 / 정책 모니터링 / 체크리스트</li>
      </ul>
    </div>
    <div>
      <h3><span class="num">·</span>상위 과제 연계</h3>
      <div class="card"><div class="k">실행과제</div>퍼블리싱 게임 품질 기반 강화 → <strong>출시 품질 Gate 통합 기준</strong>의 마켓 영역. 마켓 제출 Gate = QA 착수/출시 승인의 전제 조건.</div>
      <div class="card"><div class="k">데이터 연계</div>마켓 검수 현황은 wiki "Market Store"(SSoT) → <strong>QA-Dashboard Market Review(PRH) 탭</strong>으로 시각화.</div>
      <div class="note"><strong>판단 상태(Pass / Conditional Pass / Fail)</strong>를 마켓 제출 단계에 표준 적용.</div>
    </div>
  </div>
</div>`);

/* 4 공통 플로우 */
S("공통 플로우", `<div class="slide">
  <div class="s-band"><span class="brand">Market Process Standard</span><span class="sec">01 · Common Flow</span></div>
  <span class="eyebrow">표준 출시 플로우</span>
  <h2 class="title">제출까지의 <em>공통 단계</em></h2>
  <div class="flow">
    <div class="step"><div class="n">D-90</div><div class="t">전략·계정</div><div class="d">스토어 계정/권한, 피처드 목표</div></div>
    <div class="step"><div class="n">D-75</div><div class="t">테스트 배포</div><div class="d">TestFlight / 비공개 트랙</div></div>
    <div class="step"><div class="n">D-45</div><div class="t">자산·피처드</div><div class="d">스크린샷·영상, 피처드 제안</div></div>
    <div class="step"><div class="n">D-14</div><div class="t">제출</div><div class="d">빌드 업로드·심사 제출</div></div>
    <div class="step"><div class="n">D-Day</div><div class="t">출시</div><div class="d">단계 출시·모니터링</div></div>
  </div>
  <div class="cols">
    <div>
      <h3><span class="num">·</span>마켓 제출 Gate (Pass/Conditional/Fail)</h3>
      <ul>
        <li><strong>기능 안정성</strong> — 핵심 플로우(로그인·결제·진입) 정상</li>
        <li><strong>플랫폼/마켓 연동</strong> — 빌링·계정·게임서비스</li>
        <li><strong>성능·안정성</strong> — 크래시/ANR, 호환성</li>
      </ul>
    </div>
    <div>
      <h3><span class="num">·</span>BVT/BAT 연계</h3>
      <ul>
        <li>BVT/BAT 미통과 빌드 → QA 착수 제한</li>
        <li>예외(조건부 착수) 기준 별도 정의</li>
        <li>제출 빌드 = BAT 통과 RC 빌드 원칙</li>
      </ul>
    </div>
  </div>
</div>`);

/* 5 APPLE 제출 */
S("Apple 제출", `<div class="slide">
  <div class="s-band"><span class="brand">Apple App Store</span><span class="sec">02 · Apple ①</span></div>
  <span class="eyebrow">App Store Connect</span>
  <h2 class="title">Apple <em>제출 프로세스</em> <span class="chip apple">Apple</span></h2>
  <div class="cols">
    <div>
      <h3><span class="num">1</span>계정·앱 등록</h3>
      <ol>
        <li>App Store Connect에서 신규 앱 생성 (Bundle ID·SKU·기본 언어)</li>
        <li>App 정보: 카테고리, 연령 등급, 지역</li>
        <li><strong>App Privacy(개인정보 영양성분표)</strong> 작성 — 데이터 수집 항목 고지 <span class="chip new">2026 필수</span></li>
      </ol>
      <h3><span class="num">2</span>빌드 업로드</h3>
      <ol>
        <li>Xcode/Transporter로 빌드 업로드 → 처리 대기</li>
        <li>수출 규정(암호화) 준수 선언</li>
        <li>빌드를 버전에 연결</li>
      </ol>
    </div>
    <div>
      <h3><span class="num">3</span>메타데이터·자산</h3>
      <ul>
        <li>스크린샷(<strong>iPhone Pro Max 2868×1320 등</strong>), 미리보기 영상</li>
        <li>설명·키워드·프로모션 텍스트·지원 URL</li>
        <li>심사 메모 + 데모 계정 제공(로그인 필요 시 필수)</li>
      </ul>
      <h3><span class="num">4</span>심사 제출</h3>
      <ul>
        <li>수동/자동 출시, 단계적 출시(Phased Release) 선택</li>
        <li>심사 평균 <strong>24~48h</strong></li>
        <li>In-App Events / 가격·국가 설정</li>
      </ul>
      <div class="note">로그인·결제 포함 게임은 <strong>데모 계정 미제공 = 반려 단골 사유</strong>. 제출 전 필수 점검.</div>
    </div>
  </div>
</div>`);

/* 6 TestFlight */
S("TestFlight", `<div class="slide">
  <div class="s-band"><span class="brand">Apple App Store</span><span class="sec">02 · Apple ②</span></div>
  <span class="eyebrow">베타 배포</span>
  <h2 class="title">TestFlight <em>베타 테스트</em> <span class="chip apple">Apple</span></h2>
  <div class="cols">
    <div>
      <h3><span class="num">·</span>구성</h3>
      <table>
        <tr><th>그룹</th><th>인원</th><th>심사</th></tr>
        <tr><td>내부 테스터</td><td>최대 100명(팀 계정)</td><td>심사 불필요</td></tr>
        <tr><td>외부 테스터</td><td>최대 10,000명</td><td>최초 빌드 베타 심사</td></tr>
      </table>
      <ul>
        <li>빌드 유효기간 90일</li>
        <li>그룹별 빌드 배포 + 피드백 수집</li>
      </ul>
    </div>
    <div>
      <h3><span class="num">·</span>QA 활용</h3>
      <ul>
        <li>출시 2~3개월 전 베타 시작 → 사용자 피드백·크래시 수집</li>
        <li>마켓 제출 전 실기기 호환성 사전 검증</li>
        <li>피처드 제안 자산 준비와 병행</li>
      </ul>
      <div class="note">TestFlight 외부 베타 = 출시 빌드와 동일 환경(라이브 서버) 검증 권장.</div>
    </div>
  </div>
</div>`);

/* 7 Apple Guideline */
S("Apple 가이드라인", `<div class="slide">
  <div class="s-band"><span class="brand">Apple App Store</span><span class="sec">02 · Apple ③</span></div>
  <span class="eyebrow">App Review Guidelines</span>
  <h2 class="title">심사 <em>5대 영역</em> <span class="chip apple">Apple</span></h2>
  <div class="cols-3">
    <div>
      <h3><span class="num">1</span>안전성</h3>
      <ul><li>불쾌·유해 콘텐츠 차단</li><li>UGC 신고/차단 기능</li><li>아동 안전·개인정보</li></ul>
      <h3><span class="num">2</span>성능</h3>
      <ul><li>완성도(베타·크래시 금지)</li><li>정확한 메타데이터</li><li>하드웨어 호환</li></ul>
    </div>
    <div>
      <h3><span class="num">3</span>비즈니스</h3>
      <ul><li><strong>IAP 강제</strong>(디지털 재화)</li><li>외부 결제 유도 제한</li><li>구독·자동갱신 고지</li></ul>
      <h3><span class="num">4</span>디자인</h3>
      <ul><li>HIG 준수</li><li>최소 기능·독창성</li><li>스팸·복제 금지</li></ul>
    </div>

    <tr><td>레거시 문서</td><td>2015·2018 자료 혼재</td><td>현행화 또는 아카이브 분리</td></tr>
    <tr><td>실행과제 Status</td><td>공란</td><td>진행률 갱신(현재 ~75%)</td></tr>
  </table>
  <div class="note"><strong>완료 판정:</strong> Apple 축 ≈완료 · Google SOP·반려 매뉴얼 잔여. 위 6건 중 상단 2건 닫으면 "표준화 완료" 선언 가능.</div>
</div>`);

/* 19 마무리 */
S("요약", `<div class="slide cover">
  <div class="kicker">Summary</div>
  <h1>표준화는 <span class="it">사람이 바뀌어도</span><br>같은 품질</h1>
  <div class="sub">단계별 SOP + 반려 예방 플레이북 + 정책 자동 감시. Apple은 완성 수준, Google SOP·반려 매뉴얼을 닫으면 과제 완료.</div>
  <div class="meta">
    <div><div class="l">Apple</div><div class="v">제출·심사·피처드 표준화 ✓</div></div>
    <div><div class="l">Google</div><div class="v">트랙·Vitals 정리 · SOP 보강</div></div>
    <div><div class="l">정책</div><div class="v">Slack RSS 모니터링 ✓</div></div>
    <div><div class="l">완료도</div><div class="v">≈ 75% → 잔여 2건</div></div>
  </div>
</div>`);

/* ---- render ---- */
const track=document.getElementById('track');
track.innerHTML=SLIDES.map(s=>s.html).join('');
document.getElementById('tot').textContent=SLIDES.length;
// build TOC
const tocGroups=["표지","목차","개요","공통","Apple","Apple","Apple","Apple","Apple","Google","Google","Google","Google","Google","정책","검수","스토어","향후","요약"];
const toc=document.getElementById('toc');
if(toc){ toc.innerHTML=SLIDES.map((s,i)=>
  `<div class="row" onclick="go(${i})"><span class="no">${String(i+1).padStart(2,'0')}</span><span class="nm">${s.title}</span><span class="gp">${tocGroups[i]||''}</span></div>`).join(''); }

let idx=0;
function render(){
  track.style.transform=`translateX(-${idx*100}%)`;
  document.getElementById('cur').textContent=idx+1;
  document.getElementById('ttl').textContent=SLIDES[idx].title;
  document.getElementById('prev').disabled=idx===0;
  document.getElementById('next').disabled=idx===SLIDES.length-1;
  document.getElementById('prog').style.width=((idx+1)/SLIDES.length*100)+'%';
  const sl=track.children[idx]; if(sl) sl.scrollTop=0;
}
function move(d){ const n=idx+d; if(n>=0&&n<SLIDES.length){idx=n;render();} }
function go(i){ if(i>=0&&i<SLIDES.length){idx=i;render();} }
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'){move(1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){move(-1);}
  else if(e.key==='Home'){go(0);} else if(e.key==='End'){go(SLIDES.length-1);}
});
render();
</script>
