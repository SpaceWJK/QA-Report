<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전사 공통 품질지표 정의 및 표준화</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<style>
:root{
  --paper:#efece6; --ink:#1c1815; --mute:#7a716a; --wine:#7a1f2b; --line:#c9c2b8; --surface:#e8e4dc;
  --serif:'Playfair Display',Georgia,serif; --sans:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  --good:#3a6b4f; --warn:#9a6a1f; --bad:#8a2a2a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:#11100e;color:var(--ink);font-family:var(--sans);font-size:14.5px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow:hidden;}
.deck{position:fixed;inset:0;display:flex;flex-direction:column;}
.stage{flex:1;position:relative;overflow:hidden;}
.progress{position:absolute;top:0;left:0;height:2px;background:var(--wine);transition:width .4s;z-index:5;}
.track{display:flex;height:100%;transition:transform .5s cubic-bezier(.7,0,.2,1);}
.slide{min-width:100%;height:100%;overflow-y:auto;background:var(--paper);display:flex;flex-direction:column;padding:42px 6vw 64px;}
.s-band{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:9px;margin-bottom:22px;}
.s-band .brand{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--wine);}
.s-band .sec{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);}
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--wine);margin-bottom:11px;}
h2.title{font-family:var(--serif);font-weight:700;font-size:clamp(23px,2.9vw,36px);line-height:1.13;margin-bottom:15px;}
h2.title em{font-style:italic;color:var(--wine);}
.lead{font-size:15.5px;line-height:1.66;color:#3a342e;max-width:74ch;border-left:3px solid var(--wine);padding-left:16px;margin-bottom:18px;}
p{margin-bottom:9px;color:#3a342e;max-width:80ch;}
strong{color:var(--ink);font-weight:700;}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:0 36px;}
@media(max-width:900px){.cols{grid-template-columns:1fr;}}
h3{font-family:var(--serif);font-size:17px;font-weight:600;margin:14px 0 7px;}
h3 .num{color:var(--wine);font-style:italic;margin-right:7px;}
h4{font-size:13px;font-weight:700;color:var(--wine);margin:12px 0 5px;letter-spacing:.02em;}
ul{list-style:none;margin:5px 0 12px;} li{position:relative;padding-left:16px;margin-bottom:6px;font-size:13.5px;color:#3a342e;}
li::before{content:'—';position:absolute;left:0;color:var(--wine);}
table{width:100%;border-collapse:collapse;margin:9px 0 13px;font-size:12.5px;}
th{text-align:left;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--mute);font-weight:700;border-bottom:1.5px solid var(--ink);padding:7px 9px;}
th.acc{color:var(--wine);}
td{padding:7px 9px;border-bottom:1px solid var(--line);color:#3a342e;vertical-align:top;}
td:first-child{color:var(--ink);font-weight:600;} tr:hover td{background:var(--surface);}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;letter-spacing:.03em;}
.tag.g{background:rgba(58,107,79,.14);color:var(--good);} .tag.w{background:rgba(154,106,31,.14);color:var(--warn);} .tag.b{background:rgba(138,42,42,.14);color:var(--bad);}
.note{border-left:3px solid var(--wine);background:rgba(122,31,43,.05);padding:11px 15px;font-size:13px;margin:11px 0;}
.note.warn{border-color:var(--warn);background:rgba(154,106,31,.06);}
.codeblk{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;background:#26221d;color:#e8e2d8;padding:13px 16px;border-radius:5px;margin:10px 0;white-space:pre;overflow-x:auto;line-height:1.5;}
.idx{columns:2;column-gap:40px;}
@media(max-width:900px){.idx{columns:1;}}
.idx .row{break-inside:avoid;display:flex;gap:11px;padding:6px 0;border-bottom:1px solid var(--line);align-items:baseline;}
.idx .row .nn{font-family:var(--serif);font-style:italic;color:var(--wine);font-size:13px;min-width:24px;}
.idx .row .tt{font-size:13.5px;color:#3a342e;}
.cover{justify-content:center;background:radial-gradient(120% 90% at 80% 12%,#e8e4dc 0%,var(--paper) 55%);}
.cover .kick{font-size:11.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--wine);margin-bottom:20px;}
.cover h1{font-family:var(--serif);font-weight:700;font-size:clamp(30px,5.2vw,62px);line-height:1.04;letter-spacing:-.02em;margin-bottom:16px;}
.cover h1 .it{font-style:italic;color:var(--wine);}
.cover .sub{font-size:17px;color:var(--mute);max-width:60ch;margin-bottom:32px;}
.cover .meta{display:flex;gap:34px;border-top:1px solid var(--line);padding-top:16px;flex-wrap:wrap;}
.cover .meta .l{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);}
.cover .meta .v{font-size:14.5px;font-weight:600;}
.controls{height:56px;background:#11100e;border-top:1px solid #2a2722;display:flex;align-items:center;padding:0 20px;gap:14px;color:#cfc7bd;}
.controls .ttl{font-size:11px;letter-spacing:.05em;color:#8c857c;flex:1;text-transform:uppercase;}
.controls .pager{font-family:var(--serif);font-style:italic;font-size:14px;color:#efece6;min-width:60px;text-align:right;}
.controls button{width:34px;height:34px;border:1px solid #3a3631;background:transparent;color:#efece6;font-size:15px;cursor:pointer;border-radius:50%;}
.controls button:hover{background:var(--wine);border-color:var(--wine);}
.controls button:disabled{opacity:.3;cursor:not-allowed;}
.hint{position:fixed;bottom:64px;right:14px;font-size:10.5px;color:#6f6860;}
</style>
</head>
<body>
<div class="deck">
  <div class="stage"><div class="progress" id="prog"></div><div class="track" id="track"></div></div>
  <div class="controls">
    <div class="ttl" id="ttl"></div>
    <button id="prev" onclick="move(-1)">‹</button>
    <div class="pager"><span id="cur">1</span> / <span id="tot"></span></div>
    <button id="next" onclick="move(1)">›</button>
  </div>
</div>
<div class="hint">← → 키 이동 · 목차 클릭 이동</div>
<script>
const S=[];function add(t,h){S.push({t,h});}
function band(sec){return `<div class="s-band"><span class="brand">전사 공통 품질지표 정의 및 표준화</span><span class="sec">${sec}</span></div>`;}

/* 1 표지 */
add("표지",`<div class="slide cover">
  <div class="kick">품질 거버넌스 & 데이터 기반 운영 · 전사 품질지표 체계 수립</div>
  <h1>전사 공통<br><span class="it">품질지표 정의·표준화</span></h1>
  <div class="sub">측정하지 못하는 것은 관리하지 못하고, 정의하지 않은 지표는 조직마다 다르게 해석된다 — 공통 지표 정의로 판단의 주관성을 제거한다.</div>
  <div class="meta">
    <div><div class="l">사업과제</div><div class="v">품질 거버넌스 & 데이터 기반 운영</div></div>
    <div><div class="l">상세과제</div><div class="v">전사 품질지표 체계 수립 및 품질 의사결정 기준 정립</div></div>
  </div>
</div>`);

/* 2 목차 */
add("목차",`<div class="slide">
  ${band("Contents")}
  <span class="eyebrow">목차</span>
  <h2 class="title">이 문서가 <em>다루는 것</em></h2>
  <div class="idx" id="toc"></div>
  <div class="note">배경(지표 불통일의 비용) → 과제정의 → 핵심 메트릭 5종 → PASS Rate 3등급 → Sign-off 임계값(단계별·업데이트 유형별) → 결함 처리 SLA → 장애 대응 SLA → 기술 성능 임계값+Canary → 서비스 Tier+모니터링 → GAP 진단 → 개선 로드맵 → 안티패턴 → 자가점검+용어.</div>
</div>`);

/* 3 배경 */
add("배경 — 지표 불통일의 비용",`<div class="slide">
  ${band("Background — Why")}
  <span class="eyebrow">배경 · 지표 불통일이 만드는 비용</span>
  <h2 class="title">공통 지표 미정의 = <em>판단의 주관화</em></h2>
  <table>
    <tr><th>GAP ID</th><th>현상</th><th class="acc">위험도</th></tr>
    <tr><td><strong>G-02</strong></td><td>Sign-off 최종 결정이 사업PM 단독 → QA 의견 구조적 무시 가능</td><td><span class="tag b">High</span></td></tr>
    <tr><td><strong>G-03</strong></td><td>BAT에 정량적 PASS/FAIL 기준 없음 → 담당자마다 판단 기준 상이</td><td><span class="tag w">Medium</span></td></tr>
    <tr><td><strong>M-01/M-02</strong></td><td>DDR·회귀 결함율 측정 루틴 미정의 → 출시 후 품질 소급 불가</td><td><span class="tag w">Medium</span></td></tr>
    <tr><td><strong>M-03</strong></td><td>라이브 대시보드 임계값 분산 관리 → 통합 모니터링 불가</td><td><span class="tag b">High</span></td></tr>
  </table>
  <div class="cols">
    <div><h4>구조적 결과</h4>
      <ul>
        <li>동일 서비스도 QA팀·사업팀·개발사 간 "합격" 기준 상이</li>
        <li>QA가 소싱·계약·FCB 단계 개입 불가 → 초기 품질 리스크 누락 (G-01, High)</li>
        <li>임계값 분산 관리 → 통합 모니터링 불가 (M-03)</li>
      </ul></div>
    <div><h4>핵심 메시지</h4>
      <ul>
        <li>공통 지표 = 모든 판단의 출발점</li>
        <li>산출식이 다르면 수치가 같아도 의미가 다름</li>
        <li>지표 표준화 없이 GAP High 3건 해소 불가</li>
      </ul></div>
  </div>
</div>`);

/* 4 과제 정의 */
add("과제 정의",`<div class="slide">
  ${band("Initiative")}
  <span class="eyebrow">과제 정의 · OKR 연결</span>
  <h2 class="title">같은 <em>잣대</em>로 측정하고 비교한다</h2>
  <table>
    <tr><th>Key Result</th><th>현재</th><th>목표</th><th class="acc">시점</th></tr>
    <tr><td>Sign-off QA 공동 서명 적용률</td><td>0%</td><td><strong>100%</strong></td><td>Phase 1</td></tr>
    <tr><td>BAT 정량 기준 항목 수</td><td>0개</td><td><strong>≥10개</strong></td><td>Phase 1</td></tr>
    <tr><td>DDR 측정 루틴 적용</td><td>0</td><td><strong>전체 신작</strong></td><td>Phase 1</td></tr>
    <tr><td>자동화 TC 비율</td><td>~0%</td><td><strong>50% → 80%</strong></td><td>Phase 2→3</td></tr>
    <tr><td>TC 관리 도구</td><td>스프레드시트</td><td><strong>TestRail/Xray</strong></td><td>Phase 2</td></tr>
  </table>
  <div class="cols">
    <div><h4>Initiative 3 Phase</h4>
      <ul>
        <li>Phase 1 (0~3개월): 지표 정의·Sign-off 거버넌스·DDR 루틴</li>
        <li>Phase 2 (3~6개월): 도구 도입·자동화 기반</li>
        <li>Phase 3 (6~12개월): 자동화 확장·조직 안착</li>
      </ul></div>
    <div><h4>전제 원칙</h4>
      <ul>
        <li>산출식 통일 없이 프로젝트 간 비교 무효</li>
        <li>지표는 판단 보조 — 단독 결정 요소 아님</li>
        <li>Critical PASS Rate는 100% 외 협의 불가 (절대 조건)</li>
      </ul></div>
  </div>
</div>`);

/* 5 핵심 메트릭 5종 */
add("핵심 QA 메트릭 5종",`<div class="slide">
  ${band("Core Metrics Definition")}
  <span class="eyebrow">핵심 QA 메트릭 5종 · 산출식·기준값·측정 시점</span>
  <h2 class="title">5종 지표로 <em>품질을 측정</em>한다</h2>
  <table>
    <tr><th>지표명</th><th>산출식</th><th>기준값</th><th class="acc">측정 시점</th></tr>
    <tr><td><strong>PASS Rate</strong></td><td>PASS TC ÷ 전체 실행 TC × 100</td><td>≥90% 정상 / 80~89% 주의 / &lt;80% 위험</td><td>매 테스트 사이클 종료 시</td></tr>
    <tr><td><strong>Critical PASS Rate</strong></td><td>PASS Critical TC ÷ 전체 Critical TC × 100</td><td><strong>100% 필수</strong> (99% 이하 = RC FAIL)</td><td>RC 진입 판단 시</td></tr>
    <tr><td><strong>DDR</strong></td><td>출시 전 발견 결함 ÷ 전체 결함 × 100</td><td>≥95%</td><td>출시 후 <strong>2주 소급</strong> 측정</td></tr>
    <tr><td><strong>Regression Defect Rate</strong></td><td>회귀 이슈 ÷ 전체 이슈 × 100</td><td>≤5%</td><td>스프린트/패치 사이클 종료 시</td></tr>
    <tr><td><strong>Defect Handling Rate</strong></td><td>처리 완료 결함 ÷ 전체 등록 결함 × 100</td><td>≥80%</td><td>주간 단위</td></tr>
  </table>
  <div class="note">Critical PASS Rate 99% 이하는 PASS Rate 수치와 무관하게 RC 진입 차단. DDR은 출시 시점이 아닌 출시 후 2주 소급 — 측정 루틴 사전 설계 필수. 5종 모두 단일 대시보드에서 실시간 확인 가능해야 함 (M-03 해소 조건).</div>
</div>`);

/* 6 PASS Rate */
add("PASS Rate 3등급 판정",`<div class="slide">
  ${band("PASS Rate — 3-Level Judgment")}
  <span class="eyebrow">PASS Rate 3등급 · 기준값 해석 · 판단 주의사항</span>
  <h2 class="title">PASS Rate를 <em>바르게</em> 읽는다</h2>
  <table>
    <tr><th>등급</th><th>범위</th><th class="acc">조치 방향</th></tr>
    <tr><td>🟢 <strong>정상</strong></td><td>≥90%</td><td>다음 단계 진입 검토 가능</td></tr>
    <tr><td>🟡 <strong>주의</strong></td><td>80%~89%</td><td>원인 분석 + Sign-off 연기 검토</td></tr>
    <tr><td>🔴 <strong>위험</strong></td><td>&lt;80%</td><td>즉시 중단·에스컬레이션</td></tr>
  </table>
  <h4>판단 트리</h4>
  <div class="codeblk">PASS Rate ≥90%?
  → Critical PASS Rate = 100%? → YES → 다음 단계 진입 가능
                                  → NO  → RC FAIL (단계 무관 차단)

PASS Rate 80~89%?
  → Open Critical = 0건? → YES → 안정화 초기 한정 진입 가능
                           → NO  → 진입 불가

PASS Rate &lt;80% → 단계·조건 무관 → 즉시 중단</div>
  <div class="cols">
    <div><h4>주의사항</h4>
      <ul>
        <li>PASS Rate만 보고 Critical PASS Rate 생략 금지</li>
        <li>TC 모수(분모) 적을수록 PASS Rate 왜곡 → RC Coverage ≥95% 병행 확인</li>
        <li>추세로 판단 — 단일 시점 수치로 단정 금지</li>
      </ul></div>
    <div><h4>RC Coverage 기준</h4>
      <ul>
        <li>RC Coverage: ≥95% (RC 단계 TC 실행 커버리지)</li>
        <li>Regression Coverage: 단계별 상이 (CCB→50%→80%→95%)</li>
        <li>산출 기준 통일 필수 — 다르면 프로젝트 간 비교 무효</li>
      </ul></div>
  </div>
</div>`);

/* 7 단계별 Sign-off */
add("단계별 Sign-off 임계값",`<div class="slide">
  ${band("Stage Gate — Sign-off Thresholds")}
  <span class="eyebrow">CCB Entry → RC → Launch 단계별 기준</span>
  <h2 class="title">단계마다 <em>다른 기준</em>을 적용한다</h2>
  <table>
    <tr><th>단계</th><th>PASS Rate</th><th>P0 PASS</th><th>Open Critical</th><th class="acc">Regression Coverage</th></tr>
    <tr><td><strong>CCB Entry</strong></td><td>—</td><td>—</td><td>0건</td><td>Smoke (핵심 10항목)</td></tr>
    <tr><td><strong>안정화 초기</strong> (1~2주)</td><td>≥80%</td><td>100%</td><td>0건</td><td>50%</td></tr>
    <tr><td><strong>안정화 후기</strong> (3~7주)</td><td>≥85%</td><td>100%</td><td>0건</td><td>80%</td></tr>
    <tr><td><strong>RC</strong></td><td>≥90%</td><td>100%</td><td>0건</td><td>≥95%</td></tr>
    <tr><td><strong>Sign-off (Launching)</strong></td><td>≥90%</td><td>100%</td><td>0건</td><td>≥95%</td></tr>
  </table>
  <div class="cols">
    <div><h4>절대 조건 (전 단계 공통)</h4>
      <ul>
        <li><strong>Open Critical 0건</strong> — 수치와 무관하게 1건이라도 있으면 진입 차단</li>
        <li><strong>P0 PASS 100%</strong> — RC부터는 Critical PASS Rate와 동시 확인</li>
        <li>Regression Coverage = 단계 올라갈수록 확장 의무</li>
      </ul></div>
    <div><h4>거버넌스 원칙 (G-02 해소)</h4>
      <ul>
        <li>Sign-off: 사업PM 단독 → <strong>QA Lead 공동 서명</strong> 의무화</li>
        <li>현재 적용률 0% → Phase 1 목표 100%</li>
        <li>QA Lead 서명 없이 Launching 진행 시 프로세스 위반 기록</li>
      </ul></div>
  </div>
</div>`);

/* 8 업데이트 타입별 */
add("업데이트 타입별 Sign-off",`<div class="slide">
  ${band("Update Type — Sign-off Matrix")}

   (≥90% 정상 / 80~89% 주의 / &lt;80% 즉시 차단)

   (99% 이하 → RC FAIL, 단계 무관)
□ Open Critical = 0건 확인
   (1건이라도 있으면 전 단계 차단)
□ Regression Coverage 해당 단계 충족
   (초기 50% / 후기 80% / RC·Launch ≥95%)
□ P1 결함 SLA ≤4시간 충족 여부
□ 업데이트 유형 QA Lead+사업PM 합의 확인
□ DDR 측정 마감일(출시 후 2주) 캘린더 등록
□ QA Lead 공동 서명 포함 여부 (G-02 해소)</div>
    </div>
    <div><h4>핵심 용어</h4>
    <table>
      <tr><th>용어</th><th class="acc">정의</th></tr>
      <tr><td>P0 (Critical)</td><td>서비스 운영 불가 수준 결함. Critical PASS Rate 대상. Sign-off 전 전 단계 Open 건수 0 조건</td></tr>
      <tr><td>PASS Rate</td><td>PASS TC ÷ 전체 실행 TC × 100</td></tr>
      <tr><td>Critical PASS Rate</td><td>PASS P0(Critical) TC ÷ 전체 Critical TC × 100. 100% 필수 — 99% 이하 RC FAIL</td></tr>
      <tr><td>DDR</td><td>출시 전 발견 결함 ÷ 전체 결함 × 100 (출시 후 2주 소급)</td></tr>
      <tr><td>Regression Defect Rate</td><td>회귀 이슈 ÷ 전체 이슈 × 100</td></tr>
      <tr><td>Defect Handling Rate</td><td>처리 완료 결함 ÷ 전체 등록 결함 × 100</td></tr>
      <tr><td>Open Critical</td><td>P0(Critical) 미처리 상태 결함 — Sign-off 전 단계 차단 조건</td></tr>
      <tr><td>CCB Entry</td><td>Change Control Board Entry — 안정화 단계 진입 게이트</td></tr>
      <tr><td>BAT</td><td>Build Acceptance Test — 빌드 수락 검증</td></tr>
      <tr><td>BVT</td><td>Build Verification Test — 빌드 기본 동작 검증</td></tr>
      <tr><td>BISKIT</td><td>사내 지표 분석 플랫폼. 론칭 6개월 전 연동 요청 권장 (framework_v3/08)</td></tr>
      <tr><td>War-Room</td><td>긴급 대응 채널. 기술PM/QA/운영/사업PM 전원 참여</td></tr>
      <tr><td>RC Coverage</td><td>RC 단계 TC 실행 커버리지. 기준: ≥95%</td></tr>
      <tr><td>P95</td><td>상위 95번째 백분위 응답시간</td></tr>
      <tr><td>Canary 배포</td><td>트래픽 5~10% 우선 배포 후 15~30분 모니터링 → 전체 배포</td></tr>
    </table>
    <p style="font-size:11px;color:var(--mute);margin-top:8px">참조 출처: framework_v3/08 전용. 본 덱 외 수치 추가 시 출처 명기 의무.</p>
    </div>
  </div>
</div>`);

const track=document.getElementById('track');
track.innerHTML=S.map(s=>s.h).join('');
document.getElementById('tot').textContent=S.length;
const toc=document.getElementById('toc');
if(toc){toc.innerHTML=S.map((s,idx)=>idx<2?'':`<div class="row" onclick="go(${idx})" style="cursor:pointer"><span class="nn">${String(idx-1).padStart(2,'0')}</span><span class="tt">${s.t}</span></div>`).join('');}
let i=0;
function r(){track.style.transform=`translateX(-${i*100}%)`;document.getElementById('cur').textContent=i+1;document.getElementById('ttl').textContent=S[i].t;document.getElementById('prev').disabled=i===0;document.getElementById('next').disabled=i===S.length-1;document.getElementById('prog').style.width=((i+1)/S.length*100)+'%';const sl=track.children[i];if(sl)sl.scrollTop=0;}
function move(d){const n=i+d;if(n>=0&&n<S.length){i=n;r();}}
function go(n){if(n>=0&&n<S.length){i=n;r();}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='PageDown')move(1);else if(e.key==='ArrowLeft'||e.key==='PageUp')move(-1);else if(e.key==='Home'){i=0;r();}else if(e.key==='End'){i=S.length-1;r();}});
r();
</script>
