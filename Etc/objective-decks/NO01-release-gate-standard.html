<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>출시 판단 기준의 표준화 및 일관성 확보 — 출시 품질 Gate 공통 기준</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<style>
:root{
  --paper:#efece6; --ink:#1c1815; --mute:#7a716a; --wine:#7a1f2b; --line:#c9c2b8; --surface:#e8e4dc;
  --serif:'Playfair Display',Georgia,serif; --sans:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  --good:#3a6b4f; --warn:#9a6a1f; --bad:#8a2a2a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:#11100e;color:var(--ink);font-family:var(--sans);font-size:14.5px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow:hidden;}
.deck{position:fixed;inset:0;display:flex;flex-direction:column;}
.stage{flex:1;position:relative;overflow:hidden;}
.progress{position:absolute;top:0;left:0;height:2px;background:var(--wine);transition:width .4s;z-index:5;}
.track{display:flex;height:100%;transition:transform .5s cubic-bezier(.7,0,.2,1);}
.slide{min-width:100%;height:100%;overflow-y:auto;background:var(--paper);display:flex;flex-direction:column;padding:42px 6vw 64px;}
.s-band{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:9px;margin-bottom:22px;}
.s-band .brand{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--wine);}
.s-band .sec{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);}
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--wine);margin-bottom:11px;}
h2.title{font-family:var(--serif);font-weight:700;font-size:clamp(23px,2.9vw,36px);line-height:1.13;margin-bottom:15px;}
h2.title em{font-style:italic;color:var(--wine);}
.lead{font-size:15.5px;line-height:1.66;color:#3a342e;max-width:74ch;border-left:3px solid var(--wine);padding-left:16px;margin-bottom:18px;}
p{margin-bottom:9px;color:#3a342e;max-width:80ch;}
strong{color:var(--ink);font-weight:700;}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:0 36px;}
.cols3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 26px;}
@media(max-width:900px){.cols,.cols3{grid-template-columns:1fr;}}
h3{font-family:var(--serif);font-size:17px;font-weight:600;margin:14px 0 7px;}
h3 .num{color:var(--wine);font-style:italic;margin-right:7px;}
h4{font-size:13px;font-weight:700;color:var(--wine);margin:12px 0 5px;letter-spacing:.02em;}
ul{list-style:none;margin:5px 0 12px;} li{position:relative;padding-left:16px;margin-bottom:6px;font-size:13.5px;color:#3a342e;}
li::before{content:'—';position:absolute;left:0;color:var(--wine);}
table{width:100%;border-collapse:collapse;margin:9px 0 13px;font-size:12.5px;}
th{text-align:left;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--mute);font-weight:700;border-bottom:1.5px solid var(--ink);padding:7px 9px;}
th.acc{color:var(--wine);}
td{padding:7px 9px;border-bottom:1px solid var(--line);color:#3a342e;vertical-align:top;}
td:first-child{color:var(--ink);font-weight:600;} tr:hover td{background:var(--surface);}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;letter-spacing:.03em;}
.tag.g{background:rgba(58,107,79,.14);color:var(--good);} .tag.w{background:rgba(154,106,31,.14);color:var(--warn);} .tag.b{background:rgba(138,42,42,.14);color:var(--bad);}
.note{border-left:3px solid var(--wine);background:rgba(122,31,43,.05);padding:11px 15px;font-size:13px;margin:11px 0;}
.note.warn{border-color:var(--warn);background:rgba(154,106,31,.06);}
.gates{display:flex;gap:0;border:1px solid var(--line);margin:13px 0;flex-wrap:wrap;overflow:hidden;}
.gates .g{flex:1;min-width:110px;padding:10px 12px;border-right:1px solid var(--line);}
.gates .g:last-child{border-right:none;}
.gates .g .n{font-family:var(--serif);font-style:italic;color:var(--wine);font-size:12px;}
.gates .g .t{font-size:13px;font-weight:700;margin-top:2px;}
.gates .g .d{font-size:10.5px;color:var(--mute);margin-top:2px;}
.codeblk{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;background:#26221d;color:#e8e2d8;padding:13px 16px;border-radius:5px;margin:10px 0;white-space:pre;overflow-x:auto;line-height:1.5;}
.idx{columns:2;column-gap:40px;}
@media(max-width:900px){.idx{columns:1;}}
.idx .row{break-inside:avoid;display:flex;gap:11px;padding:6px 0;border-bottom:1px solid var(--line);align-items:baseline;}
.idx .row .nn{font-family:var(--serif);font-style:italic;color:var(--wine);font-size:13px;min-width:24px;}
.idx .row .tt{font-size:13.5px;color:#3a342e;}
.cover{justify-content:center;background:radial-gradient(120% 90% at 80% 12%,#e8e4dc 0%,var(--paper) 55%);}
.cover .kick{font-size:11.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--wine);margin-bottom:20px;}
.cover h1{font-family:var(--serif);font-weight:700;font-size:clamp(30px,5.2vw,62px);line-height:1.04;letter-spacing:-.02em;margin-bottom:16px;}
.cover h1 .it{font-style:italic;color:var(--wine);}
.cover .sub{font-size:17px;color:var(--mute);max-width:60ch;margin-bottom:32px;}
.cover .meta{display:flex;gap:34px;border-top:1px solid var(--line);padding-top:16px;flex-wrap:wrap;}
.cover .meta .l{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);}
.cover .meta .v{font-size:14.5px;font-weight:600;}
.controls{height:56px;background:#11100e;border-top:1px solid #2a2722;display:flex;align-items:center;padding:0 20px;gap:14px;color:#cfc7bd;}
.controls .ttl{font-size:11px;letter-spacing:.05em;color:#8c857c;flex:1;text-transform:uppercase;}
.controls .pager{font-family:var(--serif);font-style:italic;font-size:14px;color:#efece6;min-width:60px;text-align:right;}
.controls button{width:34px;height:34px;border:1px solid #3a3631;background:transparent;color:#efece6;font-size:15px;cursor:pointer;border-radius:50%;}
.controls button:hover{background:var(--wine);border-color:var(--wine);}
.controls button:disabled{opacity:.3;cursor:not-allowed;}
.hint{position:fixed;bottom:64px;right:14px;font-size:10.5px;color:#6f6860;}
</style>
</head>
<body>
<div class="deck">
  <div class="stage"><div class="progress" id="prog"></div><div class="track" id="track"></div></div>

<script>
const S=[];function add(t,h){S.push({t,h});}
const BAND=`<div class="s-band"><span class="brand">출시 품질 Gate 공통 기준</span><span class="sec">SEC</span></div>`;
function band(sec){return `<div class="s-band"><span class="brand">출시 품질 Gate 공통 기준</span><span class="sec">${sec}</span></div>`;}

/* S-01 표지 */
add("표지",`<div class="slide cover">
  <div class="kick">퍼블리싱 게임 품질 기반 강화 · 출시 품질 Gate 통합 기준 수립 및 운영</div>
  <h1>출시 판단 기준의<br><span class="it">표준화 및 일관성 확보</span></h1>
  <div class="sub">출시 품질 Gate 공통 기준 수립 및 문서화 — 프로젝트·조직별로 상이한 출시 판단 척도를 단일 기준으로 정렬하고, QA의 품질 거부권을 제도적으로 보장한다.</div>
  <div class="meta">
    <div><div class="l">사업과제</div><div class="v">퍼블리싱 게임 품질 기반 강화</div></div>
    <div><div class="l">상세과제</div><div class="v">출시 품질 Gate 통합 기준 수립 및 운영</div></div>
    <div><div class="l">발행</div><div class="v">SGP 퍼블리싱 QA실</div></div>
  </div>
</div>`);

/* S-02 목차 */
add("목차",`<div class="slide">
  ${band("Contents")}
  <span class="eyebrow">목차</span>
  <h2 class="title">이 문서가 <em>다루는 것</em></h2>
  <div class="idx" id="toc"></div>
  <div class="note">진단(현행 갭) → 정의(과제) → 기준(CCB·RC·Sign-off) → 운영(거버넌스·시나리오·점검)의 흐름으로 구성된다. 좌측 항목 클릭 시 해당 슬라이드로 이동.</div>
</div>`);

/* S-03 현행 갭 */
add("현행 갭 분석",`<div class="slide">
  ${band("Background — AS-IS Gap")}
  <span class="eyebrow">현행 갭 분석 · 왜 지금 표준화인가</span>
  <h2 class="title">지금 기준 체계의 <em>세 가지 구조적 결함</em></h2>
  <h3><span class="num">갭 1</span>기준의 분산 — 프로젝트마다 다른 척도</h3>
  <p>QA Rate 수치가 기준 문서에서는 비어 있고 실운영 위키에서만 존재하는 상태다. CCB Entry 10개 항목과 퍼블리싱 게이트 체크항목 간 1:1 매핑이 없다. 같은 빌드가 A 프로젝트에서 PASS, B 프로젝트에서 FAIL을 받는 상황이 반복된다.</p>
  <h3><span class="num">갭 2</span>Sign-off 주체의 불일치 — 문서마다 다른 결정권자</h3>
  <table>
    <tr><th>문서</th><th class="acc">Sign-off 주체</th></tr>
    <tr><td>QA 프로세스 문서</td><td>QA팀이 최종 Sign-off 수행</td></tr>
    <tr><td>운영 위기관리 문서</td><td>사업PM 주도</td></tr>
    <tr><td>퍼블리싱 프로세스 문서</td><td>QA팀이 주체</td></tr>
  </table>
  <p>동일 게이트를 다루며 주체를 다르게 명시 → 오픈 적합 회의에서 QA 판단이 무력화되는 근본 원인.</p>
  <h3><span class="num">갭 3</span>CCB FAIL 무한반복 가드레일 부재</h3>
  <p>현행: FAIL → 수정(약 3일) → 재빌드 → 재검수 → FAIL 반복. <strong>횟수 제한·에스컬레이션 기준 없음.</strong> 론칭 일정 지연의 주요 원인이나 경영진 보고 발동 기준이 없다.</p>
  <div class="note">이 세 갭의 해소가 본 Initiative의 핵심 목적이다.</div>
</div>`);

/* S-04 과제 정의 */
add("과제 정의",`<div class="slide">
  ${band("Initiative Definition")}
  <span class="eyebrow">과제 정의</span>
  <h2 class="title">공통 기준 수립 — <em>4 Activity · 3 KR</em></h2>
  <table>
    <tr><th>Activity</th><th>내용</th><th class="acc">산출물</th></tr>
    <tr><td>① Gate 적용 시점</td><td>1차 QA 착수 전(CCB Entry), RC 단계 — 적용 시점 명확화</td><td>Gate 적용 타임라인</td></tr>
    <tr><td>② 판단 대상 영역</td><td>기능 안정성 / 플랫폼·마켓 연동 / 성능·안정성 검증 범위 확정</td><td>영역별 검증 항목표</td></tr>
    <tr><td>③ 결과 상태 표준화</td><td>Pass · Conditional Pass · Fail 3상태 및 처리 경로 정의</td><td>상태 정의·처리 흐름</td></tr>
    <tr><td>④ 공통 기준 문서 관리</td><td>퍼블리싱 QA 공통 기준 문서로 Confluence 등록, 반기 1회 갱신</td><td>공통 기준 문서(본 문서)</td></tr>
  </table>
  <div class="cols">
    <div><h4>Key Results</h4>
      <ul><li><strong>KR1</strong> 프로젝트·조직별 상이 기준 정렬 → 전 프로젝트 동일 Gate 기준 적용(예외 0건)</li><li><strong>KR2</strong> QA 착수·출시 승인 혼선 감소 → Sign-off 주체 쌍방합의 구조 명문화</li><li><strong>KR3</strong> 출시 품질 판단 신뢰도 향상 → 판단 결과 정량 근거 문서화율 100%</li></ul></div>
    <div><h4>핵심 원리</h4>
      <ul><li>모든 정량 기준은 단계(CBT/론칭/업데이트)별 차등</li><li>P0·Critical·보안은 단계 무관 절대 기준</li><li>QA 거부권은 자금집행과 연동되어 실효성 확보</li></ul></div>
  </div>
</div>`);

/* S-05 5관문 */
add("Gate 전체 체계",`<div class="slide">
  ${band("Gate Architecture — 5 Gates")}
  <span class="eyebrow">Gate 전체 체계</span>
  <h2 class="title">라이프사이클의 <em>5개 의사결정 관문</em></h2>
  <div class="gates">
    <div class="g"><div class="n">Gate 0</div><div class="t">소싱위원회</div><div class="d">계약 전 · CEO 결재</div></div>
    <div class="g"><div class="n">Gate 1</div><div class="t">FCB</div><div class="d">사전제작 완료 · CEO</div></div>
    <div class="g"><div class="n">Gate 2</div><div class="t">CCB Entry</div><div class="d">QA 투입 전 · QA팀</div></div>
    <div class="g"><div class="n">Gate 3</div><div class="t">사업계획보고</div><div class="d">론칭 2~3개월 전 · CEO</div></div>
    <div class="g"><div class="n">Gate 4</div><div class="t">Sign-off</div><div class="d">배포 직전 · 사업PM+QA</div></div>
  </div>
  <table>
    <tr><th>Gate</th><th>검증 목적</th><th>의사결정자</th><th class="acc">PASS 조건</th></tr>
    <tr><td>0 소싱위원회</td><td>사업성·계약 규모</td><td>SGP CEO(40억↓)/그룹 CEO(40억↑)</td><td>위원회 과반 + CEO 결재</td></tr>
    <tr><td>1 FCB</td><td>핵심 재미 요소(Fun Loop)</td><td>CEO</td><td>핵심 기능 완성도·투자가치 판단</td></tr>
    <tr><td>2 CCB Entry</td><td>완성도 + 10 Entry Criteria</td><td><strong>QA팀(완전 거부권)</strong></td><td>10항목 전부 PASS</td></tr>
    <tr><td>3 사업계획보고</td><td>매출·손익·마케팅</td><td>CEO</td><td>사업계획서 CEO 승인</td></tr>
    <tr><td>4 Sign-off</td><td>최종 품질 적합</td><td>사업PM(결정)+QA(거부)</td><td>Readiness 정량 기준 충족</td></tr>
  </table>
  <div class="note"><strong>자금 연동</strong> — Gate 2 PASS→2차 중도금 지급 / FAIL→중도금 보류(수정 압박). Gate 4 FAIL→마케팅 예산 집행 불가. <strong>본 문서는 Gate 2와 Gate 4 사이 품질 판단 기준 전체를 다룬다.</strong></div>
</div>`);

/* S-06 CCB 10항목 */
add("CCB Entry 10항목",`<div class="slide">
  ${band("Gate 2 — CCB Entry Criteria")}
  <span class="eyebrow">Gate 2 · CCB Entry 상세</span>
  <h2 class="title">QA 투입을 결정하는 <em>10개 관문</em> — 1개라도 FAIL 시 착수 불가</h2>
  <p>기획 명세상 구현되어야 하는 콘텐츠·기능이 구현된 빌드(Contents Complete Build)인지 약 3일 검증. CCB PASS 이후를 QA 시작 시점으로 보며, 그 전엔 인력 투입·세부 테스트 미진행.</p>

    <tr><td>2</td><td>CCB Test Case</td><td><strong>FAIL 0건.</strong> 미구현 사유 N/A 불허(FAIL 처리), N/A는 개발사 코멘트 필수</td></tr>
    <tr><td>3</td><td>Admin Command</td><td>필수 치트 명령어 <strong>100% 구현·동작</strong></td></tr>
    <tr><td>4</td><td>점검·업데이트 시나리오</td><td>점검 진입·해제, 선택(2버전)·강제 업데이트 모두 정상</td></tr>
    <tr><td>5</td><td>CDN 패치 다운로드</td><td>Wi-Fi/LTE/3G <strong>15분 이내</strong>(초과 시 Background Download 구현)</td></tr>
    <tr><td>6</td><td>STOVE SDK 연동</td><td>인증·빌링·Itembox·Push·getconfig 정상(인증·빌링은 절대 기준)</td></tr>

    <tr><td>8</td><td>운영툴 CRUD</td><td>회원·아이템·로그 Create/Read/Update/Delete 전 동작</td></tr>

const track=document.getElementById('track');
track.innerHTML=S.map(s=>s.h).join('');
document.getElementById('tot').textContent=S.length;
// 목차 채우기 (표지·목차 제외)
const toc=document.getElementById('toc');
if(toc){toc.innerHTML=S.map((s,idx)=>idx<2?'':`<div class="row" onclick="go(${idx})" style="cursor:pointer"><span class="nn">${String(idx-1).padStart(2,'0')}</span><span class="tt">${s.t}</span></div>`).join('');}
let i=0;
function r(){track.style.transform=`translateX(-${i*100}%)`;document.getElementById('cur').textContent=i+1;document.getElementById('ttl').textContent=S[i].t;document.getElementById('prev').disabled=i===0;document.getElementById('next').disabled=i===S.length-1;document.getElementById('prog').style.width=((i+1)/S.length*100)+'%';const sl=track.children[i];if(sl)sl.scrollTop=0;}
function move(d){const n=i+d;if(n>=0&&n<S.length){i=n;r();}}
function go(n){if(n>=0&&n<S.length){i=n;r();}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='PageDown')move(1);else if(e.key==='ArrowLeft'||e.key==='PageUp')move(-1);else if(e.key==='Home'){i=0;r();}else if(e.key==='End'){i=S.length-1;r();}});
r();
</script>
