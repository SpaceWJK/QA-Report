<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정량 지표 기반 출시 판단 체계</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<style>
:root{
  --paper:#efece6; --ink:#1c1815; --mute:#7a716a; --wine:#7a1f2b; --line:#c9c2b8; --surface:#e8e4dc;
  --serif:'Playfair Display',Georgia,serif; --sans:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  --good:#3a6b4f; --warn:#9a6a1f; --bad:#8a2a2a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:#11100e;color:var(--ink);font-family:var(--sans);font-size:14.5px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow:hidden;}
.deck{position:fixed;inset:0;display:flex;flex-direction:column;}
.stage{flex:1;position:relative;overflow:hidden;}
.progress{position:absolute;top:0;left:0;height:2px;background:var(--wine);transition:width .4s;z-index:5;}
.track{display:flex;height:100%;transition:transform .5s cubic-bezier(.7,0,.2,1);}
.slide{min-width:100%;height:100%;overflow-y:auto;background:var(--paper);display:flex;flex-direction:column;padding:42px 6vw 64px;}
.s-band{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:9px;margin-bottom:22px;}
.s-band .brand{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--wine);}
.s-band .sec{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);}
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--wine);margin-bottom:11px;}
h2.title{font-family:var(--serif);font-weight:700;font-size:clamp(23px,2.9vw,36px);line-height:1.13;margin-bottom:15px;}
h2.title em{font-style:italic;color:var(--wine);}
.lead{font-size:15.5px;line-height:1.66;color:#3a342e;max-width:74ch;border-left:3px solid var(--wine);padding-left:16px;margin-bottom:18px;}
p{margin-bottom:9px;color:#3a342e;max-width:80ch;}
strong{color:var(--ink);font-weight:700;}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:0 36px;}
.cols3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 26px;}
@media(max-width:900px){.cols,.cols3{grid-template-columns:1fr;}}
h3{font-family:var(--serif);font-size:17px;font-weight:600;margin:14px 0 7px;}
h3 .num{color:var(--wine);font-style:italic;margin-right:7px;}
h4{font-size:13px;font-weight:700;color:var(--wine);margin:12px 0 5px;letter-spacing:.02em;}
ul{list-style:none;margin:5px 0 12px;} li{position:relative;padding-left:16px;margin-bottom:6px;font-size:13.5px;color:#3a342e;}
li::before{content:'—';position:absolute;left:0;color:var(--wine);}
table{width:100%;border-collapse:collapse;margin:9px 0 13px;font-size:12.5px;}
th{text-align:left;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--mute);font-weight:700;border-bottom:1.5px solid var(--ink);padding:7px 9px;}
th.acc{color:var(--wine);}
td{padding:7px 9px;border-bottom:1px solid var(--line);color:#3a342e;vertical-align:top;}
td:first-child{color:var(--ink);font-weight:600;} tr:hover td{background:var(--surface);}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;letter-spacing:.03em;}
.tag.g{background:rgba(58,107,79,.14);color:var(--good);} .tag.w{background:rgba(154,106,31,.14);color:var(--warn);} .tag.b{background:rgba(138,42,42,.14);color:var(--bad);}
.note{border-left:3px solid var(--wine);background:rgba(122,31,43,.05);padding:11px 15px;font-size:13px;margin:11px 0;}
.note.warn{border-color:var(--warn);background:rgba(154,106,31,.06);}
.formula{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;background:#26221d;color:#f0d9a8;padding:14px 18px;border-radius:5px;margin:10px 0;white-space:pre-wrap;line-height:1.55;}
.codeblk{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;background:#26221d;color:#e8e2d8;padding:13px 16px;border-radius:5px;margin:10px 0;white-space:pre;overflow-x:auto;line-height:1.5;}
.idx{columns:2;column-gap:40px;}
@media(max-width:900px){.idx{columns:1;}}
.idx .row{break-inside:avoid;display:flex;gap:11px;padding:6px 0;border-bottom:1px solid var(--line);align-items:baseline;}
.idx .row .nn{font-family:var(--serif);font-style:italic;color:var(--wine);font-size:13px;min-width:24px;}
.idx .row .tt{font-size:13.5px;color:#3a342e;}
.cover{justify-content:center;background:radial-gradient(120% 90% at 80% 12%,#e8e4dc 0%,var(--paper) 55%);}
.cover .kick{font-size:11.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--wine);margin-bottom:20px;}
.cover h1{font-family:var(--serif);font-weight:700;font-size:clamp(30px,5.2vw,62px);line-height:1.04;letter-spacing:-.02em;margin-bottom:16px;}
.cover h1 .it{font-style:italic;color:var(--wine);}
.cover .sub{font-size:17px;color:var(--mute);max-width:60ch;margin-bottom:32px;}
.cover .meta{display:flex;gap:34px;border-top:1px solid var(--line);padding-top:16px;flex-wrap:wrap;}
.cover .meta .l{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);}
.cover .meta .v{font-size:14.5px;font-weight:600;}
.controls{height:56px;background:#11100e;border-top:1px solid #2a2722;display:flex;align-items:center;padding:0 20px;gap:14px;color:#cfc7bd;}
.controls .ttl{font-size:11px;letter-spacing:.05em;color:#8c857c;flex:1;text-transform:uppercase;}
.controls .pager{font-family:var(--serif);font-style:italic;font-size:14px;color:#efece6;min-width:60px;text-align:right;}
.controls button{width:34px;height:34px;border:1px solid #3a3631;background:transparent;color:#efece6;font-size:15px;cursor:pointer;border-radius:50%;}
.controls button:hover{background:var(--wine);border-color:var(--wine);}
.controls button:disabled{opacity:.3;cursor:not-allowed;}
.hint{position:fixed;bottom:64px;right:14px;font-size:10.5px;color:#6f6860;}
</style>
</head>
<body>
<div class="deck">
  <div class="stage"><div class="progress" id="prog"></div><div class="track" id="track"></div></div>
  <div class="controls">
    <div class="ttl" id="ttl"></div>
    <button id="prev" onclick="move(-1)">‹</button>
    <div class="pager"><span id="cur">1</span> / <span id="tot"></span></div>
    <button id="next" onclick="move(1)">›</button>
  </div>
</div>
<div class="hint">← → 키 이동 · 목차 클릭 이동</div>
<script>
const S=[];function add(t,h){S.push({t,h});}
function band(sec){return `<div class="s-band"><span class="brand">정량 지표 기반 출시 판단</span><span class="sec">${sec}</span></div>`;}

/* 1 표지 */
add("표지",`<div class="slide cover">
  <div class="kick">퍼블리싱 게임 품질 기반 강화 · 출시 품질 Gate 통합 기준 수립 및 운영</div>
  <h1>정량 지표 기반<br><span class="it">출시 판단 체계</span></h1>
  <div class="sub">출시 판단을 주관·정성 평가가 아닌 정량 지표(메트릭) 기반으로 전환한다 — 핵심 메트릭의 정의·산출식·임계값과 RBT 우선순위 산정 체계.</div>
  <div class="meta">
    <div><div class="l">사업과제</div><div class="v">퍼블리싱 게임 품질 기반 강화</div></div>
    <div><div class="l">상세과제</div><div class="v">출시 품질 Gate 통합 기준 수립 및 운영</div></div>
  </div>
</div>`);

/* 2 목차 */
add("목차",`<div class="slide">
  ${band("Contents")}
  <span class="eyebrow">목차</span>
  <h2 class="title">이 문서가 <em>다루는 것</em></h2>
  <div class="idx" id="toc"></div>
  <div class="note">배경(정성 판단 한계) → 과제정의 → 메트릭 체계도 → 핵심 메트릭 상세(산출식·임계값) → RBT Score·우선순위 → 단계별 임계값 종합 → 산출·집계 표준 → 시나리오·안티패턴·체크리스트.</div>
</div>`);

/* 3 배경 */
add("정성 판단의 한계",`<div class="slide">
  ${band("Background — Why")}
  <span class="eyebrow">배경 · 정성 판단의 한계</span>
  <h2 class="title">직관·압박·분위기로는 <em>출시를 판단할 수 없다</em></h2>
  <div class="cols">
    <div>
      <h4>3대 구조적 문제</h4>
      <ul><li><strong>편차</strong> — 동일 빌드도 담당자 경력·성향·피로도에 따라 가/불가 갈림</li><li><strong>무력화</strong> — 정량 근거 없는 QA 반대는 "느낌적 반대"로 처리(Gap G-02)</li><li><strong>소급 불능</strong> — 출시 후 "왜 그때 결정했나" 설명·책임 추적 불가</li></ul>
    </div>
    <div>
      <h4>Gap 진단 데이터</h4>
      <table>
        <tr><th>ID</th><th>문제</th><th class="acc">위험</th></tr>
        <tr><td>G-02</td><td>Sign-off 사업PM 단독 — QA 의견 무시 가능</td><td><span class="tag b">High</span></td></tr>
        <tr><td>G-03</td><td>BAT 정량 PASS/FAIL 기준 부재</td><td><span class="tag w">Med</span></td></tr>
        <tr><td>M-01</td><td>DDR 측정 미정의 — 품질 효율 추적 불가</td><td><span class="tag w">Med</span></td></tr>
        <tr><td>M-02</td><td>회귀 결함율 목표 있으나 측정 루틴 미정의</td><td><span class="tag w">Med</span></td></tr>
      </table>
    </div>
  </div>
  <div class="note">목적 — 모든 출시 판단을 핵심 메트릭 수치 + RBT 우선순위로 정량화하여 편차·무력화·소급불능을 제거한다. <span style="color:var(--mute)">(08 §6.1)</span></div>
</div>`);

/* 4 과제 정의 */
add("과제 정의",`<div class="slide">
  ${band("Initiative & Scope")}
  <span class="eyebrow">과제 정의</span>
  <h2 class="title">정성 → <em>정량</em> 전환 — 4 Activity · 3 KR</h2>
  <table>
    <tr><th>Activity</th><th class="acc">내용</th></tr>
    <tr><td>① 핵심 메트릭 정의</td><td>PASS Rate·Critical PASS·결함처리율·Regression·DDR 등 핵심 지표 정의·산출식 확정</td></tr>
    <tr><td>② RBT Score 체계</td><td>Risk Score = Impact×Probability+Modifier, 우선순위 등급(P0~P4) 산정</td></tr>
    <tr><td>③ 임계값 수립</td><td>메트릭별 단계별(CBT/정식 출시/라이브 업데이트) Threshold 확정</td></tr>
    <tr><td>④ 산출·집계 표준화</td><td>데이터 소스·집계 주기·담당자·보고 포맷 표준화</td></tr>
  </table>
  <div class="cols">
    <div><h4>Key Results</h4>
      <ul><li>출시 판단 정량 근거 확보 — 모든 Sign-off에 핵심 메트릭 첨부 의무화</li><li>주관 편차 제거 — 담당자 교체에도 동일 기준</li><li>리스크 높은 영역 집중 — RBT Score 기반 자원 배분</li></ul></div>
    <div><h4>범위 명확화</h4>
      <p>본 문서는 <strong>판단에 쓰이는 정량 지표 자체</strong>(정의·산출·임계값·RBT 우선순위)에 집중한다. Gate 통과/실패 경로·거버넌스 구조는 별도 Gate 표준 문서를 원전으로 한다.</p></div>
  </div>
</div>`);

/* 5 체계도 */
add("메트릭 전체 체계도",`<div class="slide">
  ${band("Metric Map")}
  <span class="eyebrow">메트릭 전체 체계도</span>
  <h2 class="title">출시 판단에 쓰이는 <em>핵심 정량 지표</em></h2>
  <table>
    <tr><th>메트릭</th><th>유형</th><th>측정 시점</th><th class="acc">기준값</th></tr>
    <tr><td>① PASS Rate</td><td>TC 실행 효율</td><td>RC·Sign-off</td><td>≥ 90%</td></tr>
    <tr><td>② Critical PASS Rate</td><td>TC 실행 효율</td><td>RC 진입 전</td><td><strong>100%</strong></td></tr>
    <tr><td>③ 결함 처리율(DHR)</td><td>결함 관리</td><td>안정화 종료</td><td>≥ 80%</td></tr>
    <tr><td>④ Regression Defect Rate</td><td>결함 관리</td><td>업데이트·패치 후</td><td>≤ 5%</td></tr>
    <tr><td>⑤ DDR</td><td>품질 효율</td><td>출시 D+14 소급</td><td>≥ 95% <span style="color:var(--mute)">(정식·소급 전용)</span></td></tr>
    <tr><td>⑥ RC Coverage</td><td>커버리지</td><td>RC 종료</td><td>≥ 95%</td></tr>
    <tr><td>⑦ Regression Coverage</td><td>커버리지</td><td>단계별 측정</td><td>단계별 상이</td></tr>
  </table>
  <p style="font-size:11px;color:var(--mute)">RC Coverage(RC 단계 전체 TC 실행률)와 Regression Coverage(회귀 TC 범위 비율)는 별개 지표다. <span>(08 §1.1)</span></p>
  <div class="note"><strong>RBT Score</strong> = 우선순위 결정 엔진. 임계값 달성과 별개로 "어느 영역을 먼저·얼마나 깊게 검증할지"를 결정 — Score 높은 모듈은 Full Regression, 낮은 모듈은 Smoke로 제한된 리소스를 효율 배분. <span style="color:var(--mute)">(08 §1.1)</span></div>
</div>`);

/* 6 PASS Rate */
add("메트릭① PASS Rate",`<div class="slide">
  ${band("Metric ① PASS Rate")}
  <span class="eyebrow">핵심 메트릭 ① · 전체 TC 통과율</span>
  <h2 class="title">출시 판단의 <em>기본 체온계</em></h2>
  <div class="formula">PASS Rate = (PASS TC 수 / 전체 실행 TC 수) × 100  [%]</div>
  <div class="cols">
    <div><h4>판정 임계값</h4>
      <table>
        <tr><th>구간</th><th class="acc">수치 / 의미</th></tr>
        <tr><td><span class="tag g">정상</span></td><td>≥ 90% — Sign-off 충족 가능</td></tr>
        <tr><td><span class="tag w">주의</span></td><td>80~89% — 미해결 이슈 리뷰 후 판단</td></tr>
        <tr><td><span class="tag b">위험</span></td><td>&lt; 80% — Sign-off 불가·재테스트</td></tr>
      </table>
      <p style="font-size:12px;color:var(--mute)">소스: TC 관리 시스템 실행 로그 / 주기: 사이클 종료·RC 전·Sign-off 전</p></div>
    <div><h4>단계별 목표</h4>
      <table>
        <tr><th>단계</th><th class="acc">목표</th></tr>
        <tr><td>CBT</td><td>≥ 80%</td></tr>
        <tr><td>안정화 초기</td><td>≥ 80%</td></tr>
        <tr><td>안정화 후기</td><td>≥ 85%</td></tr>
        <tr><td>RC</td><td>≥ 90%</td></tr>
        <tr><td>정식 출시</td><td><strong>≥ 90%</strong></td></tr>
        <tr><td>메이저 업데이트</td><td><strong>≥ 95%</strong></td></tr>
        <tr><td>긴급 핫픽스</td><td>≥ 85%</td></tr>
      </table></div>
  </div>
  <div class="note">단독 판단 금지 — Critical PASS=100% + Open Critical 0건 병행 확인. 주의 구간에서는 P0·P1 우선 식별 후 RBT Score 재산정. <span style="color:var(--mute)">(08 §1.2·§2)</span></div>
</div>`);

/* 7 Critical PASS */
add("메트릭② Critical PASS",`<div class="slide">
  ${band("Metric ② Critical PASS")}
  <span class="eyebrow">핵심 메트릭 ② · P0 TC 전량 통과</span>
  <h2 class="title">단 한 건의 예외도 없는 <em>절대 기준</em></h2>
  <div class="formula">Critical PASS Rate = (PASS Critical TC 수 / 전체 Critical TC 수) × 100  [%]   (Critical = P0)</div>
  <div class="note">P0 정의 — 로그인 불가, 결제 전체 장애, 서버 접속 불가 등 서비스 전면 중단 수준 결함과 직결된 TC. <span style="color:var(--mute)">(04 §7)</span></div>
  <table>
    <tr><th>조건</th><th class="acc">판정</th></tr>
    <tr><td>Critical PASS Rate = <strong>100%</strong></td><td>RC 진입 허용</td></tr>
    <tr><td>Critical PASS Rate ≤ 99%</td><td><span class="tag b">RC FAIL 즉시 트리거</span></td></tr>
    <tr><td>Open Critical Issue = <strong>0건</strong></td><td>Sign-off 허용</td></tr>
    <tr><td>Open Critical Issue ≥ 1건</td><td><span class="tag b">Sign-off 불가(수치 무관)</span></td></tr>
  </table>
  <h4>판단 적용</h4>
  <ul><li>RC 판단 시 <strong>가장 먼저</strong> 확인 — 99% 이하면 전체 PASS Rate 무관 RC 차단</li><li>Open Critical은 TC 통과율과 별개로 JIRA에서 직접 0건 실물 확인</li><li>동일 빌드 P0 TC 2회↑ FAIL → Regression Defect 분류 + RBT Modifier +2(과거 재발) 즉시 가산</li></ul>
</div>`);

/* 8 DHR */
add("메트릭③ 결함 처리율",`<div class="slide">
  ${band("Metric ③ Defect Handling Rate")}
  <span class="eyebrow">핵심 메트릭 ③ · 결함 처리율(DHR)</span>
  <h2 class="title">발견된 버그가 <em>해소되었는가</em></h2>
  <div class="formula">DHR = (처리 완료 결함 수 / 전체 등록 결함 수) × 100  [%]

    <div><h4>단계별 임계값</h4>

        <tr><td>정식 출시</td><td><strong>≥ 80%</strong></td></tr>
        <tr><td>라이브 업데이트</td><td><strong>≥ 90%</strong></td></tr>
      </table>
      <p style="font-size:12px;color:var(--mute)">소스: JIRA 버전 필터 / 주기: 안정화 종료·Sign-off 전일</p></div>
    <div><h4>결함 처리 SLA (P 등급별)</h4>
      <table>
        <tr><th>등급</th><th>시한</th><th class="acc">미충족</th></tr>
        <tr><td>P1 Critical</td><td>≤ 4h</td><td>즉시 에스컬레이션</td></tr>
        <tr><td>P2 Major</td><td>≤ 24h</td><td>사업PM 알림</td></tr>
        <tr><td>P3 Minor</td><td>≤ 72h</td><td>스프린트 내</td></tr>
        <tr><td>P4 Trivial</td><td>다음 정기 패치</td><td>—</td></tr>
      </table></div>
  </div>
  <div class="note">DHR 미달 시 미처리 결함의 P 등급 분포 확인 — P1·P2 잔존=Sign-off 불가. P3·P4만 잔존=조건부 출시+차기 패치 계획(PM·QA팀장 공동). <span style="color:var(--mute)">(04 §4 · 08 §3.1)</span></div>
</div>`);

/* 9 Regression */

/* 10 DDR */
add("메트릭⑤ DDR",`<div class="slide">

  <h2 class="title">출시 전에 결함을 <em>얼마나 잡았는가</em> — QA 효율 성적표</h2>
  <div class="formula">DDR = (출시 전 발견 결함 수 / 전체 결함 수) × 100  [%]
전체 = 출시 전 발견 + 출시 후 2주 내 발견 / 기준일 = 출시일 + 14일</div>
  <div class="cols">
    <div><h4>임계값</h4>
      <table>
        <tr><th>판정</th><th class="acc">수치</th></tr>

        <tr><td><span class="tag w">개선 대상</span></td><td>90~94%</td></tr>
        <tr><td><span class="tag b">검출력 미달</span></td><td>&lt; 90%</td></tr>
      </table>
      <p style="font-size:12px;color:var(--mute)">소스: JIRA(출시 전)+CS·모니터링(출시 후) / 주기: D+14 소급 → 월간 리포트</p></div>
    <div><h4>판단 적용</h4>
      <ul><li>DDR은 소급 지표 — 현재 출시 판단에 직접 반영하지 않음</li><li>직전 타이틀 DDR이 낮을수록 현재 QA 계획에 리소스 가중 배분 근거</li><li>연간 DDR 트렌드로 자동화 투자 효과 검증(자동화↑→DDR↑ 상관 추적)</li></ul>
      <div class="note warn">현행 Gap M-01 — DDR 측정 루틴 미정의. Phase 1 개선: "출시 후 D+14 소급 집계 프로세스 표준화" 지정. <span style="color:var(--mute)">(08 §1.2)</span></div></div>
  </div>
</div>`);

/* 10.5 RC Coverage */
add("메트릭⑥ RC Coverage",`<div class="slide">
  ${band("Metric ⑥ RC Coverage")}
  <span class="eyebrow">핵심 메트릭 ⑥ · RC Coverage</span>
  <h2 class="title">RC 단계에서 <em>얼마나 실행했는가</em></h2>
  <div class="formula">RC Coverage = (RC 단계 실행 TC 수 / 전체 TC 수) × 100  [%]</div>
  <div class="cols">
    <div><h4>임계값</h4>
      <table>
        <tr><th>판정</th><th class="acc">기준</th></tr>
        <tr><td><span class="tag g">정상</span></td><td>≥ 95% (RC 종료 시점)</td></tr>
        <tr><td><span class="tag b">미달</span></td><td>&lt; 95% — RC 종료 불가</td></tr>
      </table>
      <p style="font-size:12px;color:var(--mute)">소스: TC 관리 시스템 / 측정: RC 종료 시점</p>
      <h4>커버리지 단계별 목표</h4>
      <table>
        <tr><th>단계</th><th class="acc">목표</th></tr>
        <tr><td>안정화 초기</td><td>50%</td></tr>
        <tr><td>안정화 후기</td><td>80%</td></tr>
        <tr><td>RC / Sign-off</td><td><strong>≥ 95%</strong></td></tr>
      </table></div>
    <div><h4>Regression Coverage와의 구분</h4>
      <ul><li><strong>RC Coverage</strong> = RC 단계에서 실행한 전체 TC 비율(실행률)</li><li><strong>Regression Coverage</strong> = 회귀 TC 범위 비율(회귀 대상 중 수행 비율)</li><li>두 지표는 별개 — RC Coverage는 "얼마나 돌렸나", Regression Coverage는 "회귀를 얼마나 덮었나"</li></ul>
      <div class="note">RC 종료 판단 시 RC Coverage ≥95%와 Regression Coverage ≥95%를 함께 확인한다. 실행률은 높아도 회귀 범위가 낮으면 회귀 누락 리스크가 남는다. <span style="color:var(--mute)">(08 §1.1·§2.1)</span></div></div>

</div>`);

      </table>
      <p style="font-size:12px;color:var(--mute)">Red=1등급 장애/롤백 고려. (08 §4.2)</p></div>
  </div>
  <h4>보고 포맷 — 권장 대시보드 구성 <span style="color:var(--mute);font-weight:400">(08 §4.4)</span></h4>

  </table>
</div>`);

/* 15 안티패턴·체크리스트 */

const track=document.getElementById('track');
track.innerHTML=S.map(s=>s.h).join('');
document.getElementById('tot').textContent=S.length;
const toc=document.getElementById('toc');
if(toc){toc.innerHTML=S.map((s,idx)=>idx<2?'':`<div class="row" onclick="go(${idx})" style="cursor:pointer"><span class="nn">${String(idx-1).padStart(2,'0')}</span><span class="tt">${s.t}</span></div>`).join('');}
let i=0;
function r(){track.style.transform=`translateX(-${i*100}%)`;document.getElementById('cur').textContent=i+1;document.getElementById('ttl').textContent=S[i].t;document.getElementById('prev').disabled=i===0;document.getElementById('next').disabled=i===S.length-1;document.getElementById('prog').style.width=((i+1)/S.length*100)+'%';const sl=track.children[i];if(sl)sl.scrollTop=0;}
function move(d){const n=i+d;if(n>=0&&n<S.length){i=n;r();}}
function go(n){if(n>=0&&n<S.length){i=n;r();}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='PageDown')move(1);else if(e.key==='ArrowLeft'||e.key==='PageUp')move(-1);else if(e.key==='Home'){i=0;r();}else if(e.key==='End'){i=S.length-1;r();}});
r();
</script>
