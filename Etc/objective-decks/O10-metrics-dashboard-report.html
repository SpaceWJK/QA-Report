<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>품질지표-대시보드-리포트 연계 운영</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<style>
:root{
  --paper:#efece6; --ink:#1c1815; --mute:#7a716a; --wine:#7a1f2b; --line:#c9c2b8; --surface:#e8e4dc;
  --serif:'Playfair Display',Georgia,serif; --sans:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:#11100e;color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;overflow:hidden;}
.deck{position:fixed;inset:0;display:flex;flex-direction:column;}
.stage{flex:1;position:relative;overflow:hidden;}
.progress{position:absolute;top:0;left:0;height:2px;background:var(--wine);transition:width .4s;z-index:5;}
.track{display:flex;height:100%;transition:transform .5s cubic-bezier(.7,0,.2,1);}
.slide{min-width:100%;height:100%;overflow-y:auto;background:var(--paper);display:flex;flex-direction:column;padding:46px 7vw 60px;}
.s-band{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:28px;}
.s-band .brand{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--wine);}
.s-band .sec{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--wine);margin-bottom:14px;}
h2.title{font-family:var(--serif);font-weight:700;font-size:clamp(26px,3.4vw,42px);line-height:1.12;margin-bottom:18px;}
h2.title em{font-style:italic;color:var(--wine);}
.lead{font-size:17px;line-height:1.7;color:#3a342e;max-width:62ch;border-left:3px solid var(--wine);padding-left:18px;margin-bottom:24px;}
p{margin-bottom:11px;color:#3a342e;max-width:74ch;}
strong{color:var(--ink);font-weight:700;}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:0 40px;}
@media(max-width:900px){.cols{grid-template-columns:1fr;}}
h3{font-family:var(--serif);font-size:18px;font-weight:600;margin:16px 0 8px;}
h3 .num{color:var(--wine);font-style:italic;margin-right:8px;}
ul{list-style:none;margin:6px 0 14px;} li{position:relative;padding-left:18px;margin-bottom:7px;font-size:14px;color:#3a342e;}
li::before{content:'—';position:absolute;left:0;color:var(--wine);}
ol{margin:6px 0 14px 20px;} ol li{padding-left:4px;} ol li::before{content:none;}
table{width:100%;border-collapse:collapse;margin:10px 0 14px;font-size:13px;}
th{text-align:left;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mute);font-weight:700;border-bottom:1.5px solid var(--ink);padding:9px 11px;}
th.acc{color:var(--wine);}
td{padding:9px 11px;border-bottom:1px solid var(--line);color:#3a342e;vertical-align:top;}
td:first-child{color:var(--ink);font-weight:600;} tr:hover td{background:var(--surface);}
.card{background:var(--surface);border:1px solid var(--line);padding:16px 18px;margin-bottom:12px;}
.card .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--wine);font-weight:700;margin-bottom:6px;}
.note{border-left:3px solid var(--wine);background:rgba(122,31,43,.05);padding:12px 16px;font-size:13px;margin:12px 0;}
.flow{display:flex;gap:0;border:1px solid var(--line);margin:14px 0;flex-wrap:wrap;overflow:hidden;}
.flow .step{flex:1;min-width:120px;padding:11px 13px;border-right:1px solid var(--line);}
.flow .step:last-child{border-right:none;}
.flow .step .n{font-family:var(--serif);font-style:italic;color:var(--wine);font-size:13px;}
.flow .step .t{font-size:13px;font-weight:600;margin-top:2px;}
.flow .step .d{font-size:11px;color:var(--mute);margin-top:2px;}
.cover{justify-content:center;background:radial-gradient(120% 90% at 80% 12%,#e8e4dc 0%,var(--paper) 55%);}
.cover .kick{font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--wine);margin-bottom:22px;}
.cover h1{font-family:var(--serif);font-weight:700;font-size:clamp(34px,6vw,72px);line-height:1.02;letter-spacing:-.02em;margin-bottom:20px;}
.cover h1 .it{font-style:italic;color:var(--wine);}
.cover .sub{font-size:18px;color:var(--mute);max-width:54ch;margin-bottom:36px;}
.cover .meta{display:flex;gap:36px;border-top:1px solid var(--line);padding-top:18px;flex-wrap:wrap;}
.cover .meta .l{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);}
.cover .meta .v{font-size:15px;font-weight:600;}
.controls{height:60px;background:#11100e;border-top:1px solid #2a2722;display:flex;align-items:center;padding:0 22px;gap:16px;color:#cfc7bd;}
.controls .ttl{font-size:12px;letter-spacing:.05em;color:#8c857c;flex:1;text-transform:uppercase;}
.controls .pager{font-family:var(--serif);font-style:italic;font-size:15px;color:#efece6;min-width:62px;text-align:right;}
.controls button{width:36px;height:36px;border:1px solid #3a3631;background:transparent;color:#efece6;font-size:16px;cursor:pointer;border-radius:50%;}
.controls button:hover{background:var(--wine);border-color:var(--wine);}
.controls button:disabled{opacity:.3;cursor:not-allowed;}
.hint{position:fixed;bottom:70px;right:16px;font-size:11px;color:#6f6860;}
</style>
</head>
<body>
<div class="deck">
  <div class="stage"><div class="progress" id="prog"></div><div class="track" id="track"></div></div>
  <div class="controls">
    <div class="ttl" id="ttl"></div>
    <button id="prev" onclick="move(-1)">‹</button>
    <div class="pager"><span id="cur">1</span> / <span id="tot"></span></div>
    <button id="next" onclick="move(1)">›</button>
  </div>
</div>
<div class="hint">← → 키 이동</div>
<script>
const S=[];function add(t,h){S.push({t,h});}

add("Cover",`<div class="slide cover">
  <div class="kick">SGP 퍼블리싱QA · 전사 품질지표 체계</div>
  <h1>품질지표<br><span class="it">대시보드 · 리포트 연계</span></h1>
  <div class="sub">정의한 품질지표를 대시보드와 월간 리포트에 연결해, 데이터 기반 품질 커뮤니케이션을 정착시킨다.</div>
  <div class="meta">
    <div><div class="l">사업과제</div><div class="v">품질 거버넌스 & 데이터 기반 운영</div></div>
    <div><div class="l">상세과제</div><div class="v">전사 품질지표 체계 수립 및 품질 의사결정 기준 정립</div></div>
  </div>
</div>`);

add("과제 정의",`<div class="slide">
  <div class="s-band"><span class="brand">전사 품질지표 체계</span><span class="sec">Definition</span></div>
  <span class="eyebrow">과제 정의</span>
  <h2 class="title">지표를 <em>흐르게</em> 한다</h2>
  <div class="lead">지표가 문서에만 머물면 죽은 숫자다. 대시보드로 보이고 리포트로 전달되어야 의사결정에 쓰인다.</div>
  <div class="cols">
    <div><h3><span class="num">·</span>Key Result</h3>
      <ul><li>지표 활용 가시성 강화</li><li>데이터 기반 품질 커뮤니케이션 정착</li></ul></div>
    <div><h3><span class="num">·</span>Initiative</h3>
      <ul><li>지표 - 대시보드 - 리포트 연계 운영</li></ul></div>
  </div>
</div>`);

add("대시보드 반영",`<div class="slide">
  <div class="s-band"><span class="brand">전사 품질지표 체계</span><span class="sec">To Dashboard</span></div>
  <span class="eyebrow">핵심 품질지표 대시보드 반영</span>
  <h2 class="title">지표를 <em>화면</em>에</h2>
  <table>
    <tr><th>지표</th><th class="acc">기준</th><th>대시보드 표시</th></tr>
    <tr><td>PASS Rate</td><td>론칭 ≥90%</td><td>차수별 추이</td></tr>
    <tr><td>Critical 현황</td><td>Open 0건</td><td>실시간 카운트</td></tr>
    <tr><td>결함처리율</td><td>론칭 ≥80%</td><td>처리 진척</td></tr>
    <tr><td>Regression Rate</td><td>≤5%</td><td>업데이트별 추이</td></tr>
    <tr><td>DDR</td><td>≥95%</td><td>출시 후 소급</td></tr>
  </table>
  <div class="note">실무 판단용(상세) / 보고용(요약) 뷰로 분리해, 동일 지표를 목적에 맞게 표시한다.</div>
</div>`);

add("리포트 요약",`<div class="slide">
  <div class="s-band"><span class="brand">전사 품질지표 체계</span><span class="sec">To Report</span></div>
  <span class="eyebrow">월간 품질 리포트 지표 요약</span>
  <h2 class="title">리포트에 <em>지표 요약</em></h2>
  <div class="cols">
    <div><h3><span class="num">·</span>월간 리포트 구성</h3>
      <ul><li>프로젝트별 핵심 지표 요약(추세 포함)</li><li>Hotfix 건수·원인 분류·재발률</li><li>Crash/Blocker 추세</li><li>전월 대비 델타</li></ul></div>
    <div><h3><span class="num">·</span>운영</h3>
      <ul><li>월 1회 정기 발행</li><li>QA·사업·개발 간 공유</li><li>지표 변화 = 커뮤니케이션 근거</li></ul></div>
  </div>
  <div class="note">리포트는 대시보드의 스냅샷 + 해석을 담아, "수치가 어떻게 변했고 무엇을 의미하는가"를 정기 전달한다.</div>
</div>`);

add("리스크 신호",`<div class="slide">
  <div class="s-band"><span class="brand">전사 품질지표 체계</span><span class="sec">Risk Signal</span></div>
  <span class="eyebrow">지표 추이 기반 리스크 신호 정의</span>
  <h2 class="title">추이로 <em>경보</em>한다</h2>
  <table>
    <tr><th>지표</th><th class="acc">주의 (Yellow)</th><th>위험 (Red)</th></tr>
    <tr><td>응답시간 P95</td><td>&gt;300ms</td><td>&gt;500ms</td></tr>
    <tr><td>에러율</td><td>&gt;0.3%</td><td>&gt;0.5%</td></tr>
    <tr><td>PASS Rate</td><td>80~89%</td><td>&lt;80%</td></tr>
    <tr><td>Critical PASS</td><td>—</td><td>&lt;100%</td></tr>
    <tr><td>Regression Rate</td><td>—</td><td>&gt;5%</td></tr>
  </table>
  <div class="note">단일 시점이 아닌 <strong>추세 하락</strong>을 리스크 신호로 정의한다. 임계 초과 시 대시보드 알림 + 리포트 리스크 항목으로 표출.</div>
</div>`);

add("개선 액션",`<div class="slide">
  <div class="s-band"><span class="brand">전사 품질지표 체계</span><span class="sec">Action Loop</span></div>
  <span class="eyebrow">지표 기반 품질 개선 액션 관리</span>
  <h2 class="title">지표 → <em>액션</em> 루프</h2>
  <div class="flow">
    <div class="step"><div class="n">1</div><div class="t">측정</div><div class="d">대시보드 지표 수집</div></div>
    <div class="step"><div class="n">2</div><div class="t">신호</div><div class="d">임계·추세 리스크 감지</div></div>
    <div class="step"><div class="n">3</div><div class="t">액션</div><div class="d">개선 과제 도출·담당 지정</div></div>
    <div class="step"><div class="n">4</div><div class="t">추적</div><div class="d">리포트로 진척·효과 확인</div></div>
  </div>
  <p>지표가 리스크 신호를 내면 <strong>개선 액션</strong>으로 전환하고, 다음 리포트에서 그 효과를 지표로 재확인한다. 지표→액션→재측정이 닫힌 루프를 이룬다.</p>
  <div class="note">지표는 보고용 숫자가 아니라 개선을 트리거하는 운영 신호로 관리한다.</div>
</div>`);

const track=document.getElementById('track');
track.innerHTML=S.map(s=>s.h).join('');
document.getElementById('tot').textContent=S.length;
let i=0;
function r(){track.style.transform=`translateX(-${i*100}%)`;document.getElementById('cur').textContent=i+1;document.getElementById('ttl').textContent=S[i].t;document.getElementById('prev').disabled=i===0;document.getElementById('next').disabled=i===S.length-1;document.getElementById('prog').style.width=((i+1)/S.length*100)+'%';const sl=track.children[i];if(sl)sl.scrollTop=0;}
function move(d){const n=i+d;if(n>=0&&n<S.length){i=n;r();}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='PageDown')move(1);else if(e.key==='ArrowLeft'||e.key==='PageUp')move(-1);else if(e.key==='Home'){i=0;r();}else if(e.key==='End'){i=S.length-1;r();}});
r();
</script>
</body>
</html>
