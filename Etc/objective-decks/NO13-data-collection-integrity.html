<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>품질 데이터 누락·지연 없는 수집 구조</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<style>
:root{
  --paper:#efece6; --ink:#1c1815; --mute:#7a716a; --wine:#7a1f2b; --line:#c9c2b8; --surface:#e8e4dc;
  --serif:'Playfair Display',Georgia,serif; --sans:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  --good:#3a6b4f; --warn:#9a6a1f; --bad:#8a2a2a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:#11100e;color:var(--ink);font-family:var(--sans);font-size:14.5px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow:hidden;}
.deck{position:fixed;inset:0;display:flex;flex-direction:column;}
.stage{flex:1;position:relative;overflow:hidden;}
.progress{position:absolute;top:0;left:0;height:2px;background:var(--wine);transition:width .4s;z-index:5;}
.track{display:flex;height:100%;transition:transform .5s cubic-bezier(.7,0,.2,1);}
.slide{min-width:100%;height:100%;overflow-y:auto;background:var(--paper);display:flex;flex-direction:column;padding:42px 6vw 64px;}
.s-band{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:9px;margin-bottom:22px;}
.s-band .brand{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--wine);}
.s-band .sec{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);}
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--wine);margin-bottom:11px;}
h2.title{font-family:var(--serif);font-weight:700;font-size:clamp(23px,2.9vw,36px);line-height:1.13;margin-bottom:15px;}
h2.title em{font-style:italic;color:var(--wine);}
.lead{font-size:15.5px;line-height:1.66;color:#3a342e;max-width:74ch;border-left:3px solid var(--wine);padding-left:16px;margin-bottom:18px;}
p{margin-bottom:9px;color:#3a342e;max-width:80ch;}
strong{color:var(--ink);font-weight:700;}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:0 36px;}
@media(max-width:900px){.cols{grid-template-columns:1fr;}}
h3{font-family:var(--serif);font-size:17px;font-weight:600;margin:14px 0 7px;}
h3 .num{color:var(--wine);font-style:italic;margin-right:7px;}
h4{font-size:13px;font-weight:700;color:var(--wine);margin:12px 0 5px;letter-spacing:.02em;}
ul{list-style:none;margin:5px 0 12px;} li{position:relative;padding-left:16px;margin-bottom:6px;font-size:13.5px;color:#3a342e;}
li::before{content:'—';position:absolute;left:0;color:var(--wine);}
table{width:100%;border-collapse:collapse;margin:9px 0 13px;font-size:12.5px;}
th{text-align:left;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--mute);font-weight:700;border-bottom:1.5px solid var(--ink);padding:7px 9px;}
th.acc{color:var(--wine);}
td{padding:7px 9px;border-bottom:1px solid var(--line);color:#3a342e;vertical-align:top;}
td:first-child{color:var(--ink);font-weight:600;} tr:hover td{background:var(--surface);}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;letter-spacing:.03em;}
.tag.g{background:rgba(58,107,79,.14);color:var(--good);} .tag.w{background:rgba(154,106,31,.14);color:var(--warn);} .tag.b{background:rgba(138,42,42,.14);color:var(--bad);}
.note{border-left:3px solid var(--wine);background:rgba(122,31,43,.05);padding:11px 15px;font-size:13px;margin:11px 0;}
.note.warn{border-color:var(--warn);background:rgba(154,106,31,.06);}
.codeblk{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;background:#26221d;color:#e8e2d8;padding:13px 16px;border-radius:5px;margin:10px 0;white-space:pre;overflow-x:auto;line-height:1.5;}
.idx{columns:2;column-gap:40px;}
@media(max-width:900px){.idx{columns:1;}}
.idx .row{break-inside:avoid;display:flex;gap:11px;padding:6px 0;border-bottom:1px solid var(--line);align-items:baseline;}
.idx .row .nn{font-family:var(--serif);font-style:italic;color:var(--wine);font-size:13px;min-width:24px;}
.idx .row .tt{font-size:13.5px;color:#3a342e;}
.cover{justify-content:center;background:radial-gradient(120% 90% at 80% 12%,#e8e4dc 0%,var(--paper) 55%);}
.cover .kick{font-size:11.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--wine);margin-bottom:20px;}
.cover h1{font-family:var(--serif);font-weight:700;font-size:clamp(30px,5.2vw,62px);line-height:1.04;letter-spacing:-.02em;margin-bottom:16px;}
.cover h1 .it{font-style:italic;color:var(--wine);}
.cover .sub{font-size:17px;color:var(--mute);max-width:60ch;margin-bottom:32px;}
.cover .meta{display:flex;gap:34px;border-top:1px solid var(--line);padding-top:16px;flex-wrap:wrap;}
.cover .meta .l{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);}
.cover .meta .v{font-size:14.5px;font-weight:600;}
.controls{height:56px;background:#11100e;border-top:1px solid #2a2722;display:flex;align-items:center;padding:0 20px;gap:14px;color:#cfc7bd;}
.controls .ttl{font-size:11px;letter-spacing:.05em;color:#8c857c;flex:1;text-transform:uppercase;}
.controls .pager{font-family:var(--serif);font-style:italic;font-size:14px;color:#efece6;min-width:60px;text-align:right;}
.controls button{width:34px;height:34px;border:1px solid #3a3631;background:transparent;color:#efece6;font-size:15px;cursor:pointer;border-radius:50%;}
.controls button:hover{background:var(--wine);border-color:var(--wine);}
.controls button:disabled{opacity:.3;cursor:not-allowed;}
.hint{position:fixed;bottom:64px;right:14px;font-size:10.5px;color:#6f6860;}
</style>
</head>
<body>
<div class="deck">
  <div class="stage"><div class="progress" id="prog"></div><div class="track" id="track"></div></div>
  <div class="controls">
    <div class="ttl" id="ttl"></div>
    <button id="prev" onclick="move(-1)">‹</button>
    <div class="pager"><span id="cur">1</span> / <span id="tot"></span></div>
    <button id="next" onclick="move(1)">›</button>
  </div>
</div>
<div class="hint">← → 키 이동 · 목차 클릭 이동</div>
<script>
const S=[];function add(t,h){S.push({t,h});}
function band(sec){return `<div class="s-band"><span class="brand">품질 데이터 누락·지연 없는 수집 구조</span><span class="sec">${sec}</span></div>`;}

/* 1 표지 */
add("표지",`<div class="slide cover">
  <div class="kick">품질 거버넌스 & 데이터 기반 운영 · 품질 대시보드 구축</div>
  <h1>품질 데이터<br><span class="it">누락·지연 없는 수집 구조</span></h1>
  <div class="sub">TC 3-Level 분류부터 Postmortem 환류까지 — 데이터 공백 없는 QA 파이프라인을 설계한다.</div>
  <div class="meta">
    <div><div class="l">사업과제</div><div class="v">품질 거버넌스 & 데이터 기반 운영</div></div>
    <div><div class="l">상세과제</div><div class="v">품질 대시보드 구축 및 데이터 기반 품질 가시성 강화</div></div>
  </div>
</div>`);

/* 2 목차 */
add("목차",`<div class="slide">
  ${band("Contents")}
  <span class="eyebrow">목차</span>
  <h2 class="title">이 문서가 <em>다루는 것</em></h2>
  <div class="idx" id="toc"></div>
  <div class="note">배경(수집 누락·지연 비용) → 과제정의(KR+Initiative) → TC 3-Level 분류 → TC ID+버전 관리 → TC 라이프사이클 → TC 우선순위+P0 원칙 → TC 핵심 지표 → 도구 로드맵 → 데이터 수집 흐름(누락·지연 방지) → Postmortem 환류 → 장애 보고 등급별 → 안티패턴 → 자가점검+용어.</div>
</div>`);

/* 3 배경 */
add("배경 — 수집 누락·지연의 비용",`<div class="slide">
  ${band("Background — Why")}
  <span class="eyebrow">배경 · 수집 누락·지연의 실제 비용</span>
  <h2 class="title">측정되지 않는 품질은 <em>관리할 수 없다</em></h2>
  <table>
    <tr><th>실패 유형</th><th>구체 현상</th><th class="acc">파급 효과</th></tr>
    <tr><td><strong>TC 미분류</strong></td><td>도메인·시나리오 코드 없이 TC 누적</td><td>DDR 측정 불가, 회귀 커버리지 공백</td></tr>
    <tr><td><strong>데이터 지연</strong></td><td>NLP 분류 60분 STALL 미감지</td><td>KPI 왜곡 → Sign-off 판단 오류</td></tr>
    <tr><td><strong>환류 단절</strong></td><td>Postmortem 후 TC 미등록</td><td>동일 장애 반복, 예방 QA 부재</td></tr>
  </table>
  <div class="cols">
    <div><h4>지표 관점 위험</h4>
      <ul>
        <li>P0 TC 자동화율 미달 → 릴리스마다 수동 재실행 비용 발생</li>
        <li>TC 유효율 80% 미만 → ACTIVE TC 실질 가치 하락</li>
        <li>일일 달성률 95% 미달 → 격차 누적, 출시 차단 판단 불가</li>
      </ul></div>
    <div><h4>핵심 전제</h4>
      <ul>
        <li>TC가 수집되지 않으면 품질이 측정되지 않는다</li>
        <li>측정되지 않는 품질은 관리할 수 없다</li>
        <li>품질 데이터는 발생 시점에 수집하지 않으면 복구되지 않는다</li>
      </ul></div>
  </div>
</div>`);

/* 4 과제 정의 */
add("과제 정의",`<div class="slide">
  ${band("Initiative")}
  <span class="eyebrow">과제 정의 · KR + Initiative</span>
  <h2 class="title">무엇을 <em>달성할 것인가</em></h2>
  <table>
    <tr><th>KR</th><th>기준값</th><th class="acc">Phase</th></tr>
    <tr><td>DDR (Defect Detection Rate)</td><td><strong>≥95%</strong></td><td>지속 추적</td></tr>
    <tr><td>P0 TC 자동화율</td><td><strong>100%</strong> (최종)</td><td>Phase 3</td></tr>
    <tr><td>TC 유효율 (ACTIVE 비율)</td><td><strong>≥80%</strong></td><td>Phase 1부터</td></tr>
    <tr><td>일일 TC 달성률</td><td><strong>≥95%</strong></td><td>Phase 2부터</td></tr>
  </table>
  <div class="cols">
    <div><h4>Initiative</h4>
      <ul>
        <li>A: TC 3-Level 분류 코드 소급 적용 (Phase 1, 즉시~1개월)</li>
        <li>B: TestRail/JIRA Xray 도입 + 일일 리포트 자동화 (Phase 2, 3~6개월)</li>
        <li>C: Appium + CI/CD 연계 / P1 자동화 50% 달성 (Phase 3, 6~12개월)</li>
        <li>D: 데이터 수집 파이프라인 지연 감지 체계 운영 (즉시)</li>
        <li>E: Postmortem → TC → 모니터링 환류 루프 제도화 (즉시)</li>
      </ul></div>
    <div><h4>지표 간 연관 관계</h4>
      <div class="codeblk">TC 유효율 하락
  → ACTIVE TC 신뢰도 하락
  → 일일 달성률 왜곡
  → DDR 과대/과소 계상
  → P0 PASS 판단 오류</div>
    </div>
  </div>
</div>`);

/* 5 TC 분류 체계 */
add("TC 3-Level 분류 체계",`<div class="slide">
  ${band("TC Classification")}
  <span class="eyebrow">TC 3-Level 분류 · 도메인→영역→시나리오</span>
  <h2 class="title">TC를 <em>3계층</em>으로 분류한다</h2>
  <div class="cols">
    <div>
      <h4>Level 1 — 도메인 (7개)</h4>
      <table>
        <tr><th>코드</th><th class="acc">도메인</th></tr>
        <tr><td>FUN</td><td>기능</td></tr>
        <tr><td>COMP</td><td>호환성</td></tr>
        <tr><td>PERF</td><td>성능</td></tr>
        <tr><td>SEC</td><td>보안</td></tr>
        <tr><td>LOC</td><td>로컬라이제이션 <span class="tag w">현행 미정의—신설 필요</span></td></tr>
        <tr><td>UX</td><td>사용자경험</td></tr>
        <tr><td>STB</td><td>안정성</td></tr>
      </table>
    </div>
    <div>
      <h4>Level 2 — 기능 영역</h4>
      <p style="font-size:12.5px;color:#3a342e;"><strong>공통 모듈:</strong> LOGIN · PAY · MATCH · NOTICE · UPDATE · BATTLE</p>
      <p style="font-size:12.5px;color:#3a342e;"><strong>RPG 특화:</strong> GROWTH · GUILD · TRADE</p>
      <p style="font-size:12.5px;color:#3a342e;"><strong>전략 특화:</strong> AI · BALANCE · RESOURCE</p>
      <h4 style="margin-top:12px;">Level 3 — 시나리오 유형 (7개)</h4>
      <table>
        <tr><th>코드</th><th>유형</th><th>코드</th><th class="acc">유형</th></tr>
        <tr><td>NF</td><td>정상흐름</td><td>CC</td><td>동시성</td></tr>
        <tr><td>AF</td><td>예외흐름</td><td>ST</td><td>스트레스</td></tr>
        <tr><td>BV</td><td>경계값</td><td>INT</td><td>연동</td></tr>
        <tr><td>REG</td><td>회귀</td><td>—</td><td>—</td></tr>
      </table>
    </div>
  </div>
  <div class="note warn">LOC(로컬라이제이션)는 현행 프레임워크 미정의 상태 — 글로벌 서비스 대비를 위해 신설 검토 필수.</div>
</div>`);

/* 6 TC ID + 버전 */
add("TC ID 명명 + 버전 관리",`<div class="slide">
  ${band("TC ID + Versioning")}
  <span class="eyebrow">TC 식별 체계 · Semantic Versioning</span>
  <h2 class="title">TC를 <em>정확하게 식별</em>한다</h2>
  <div class="cols">
    <div>
      <h4>TC ID 명명 규칙</h4>
      <div class="codeblk">[도메인코드]-[기능영역코드]-[시나리오유형]-[일련번호]</div>
      <table>
        <tr><th>예시 ID</th><th class="acc">해석</th></tr>
        <tr><td>FUN-LOGIN-NF-001</td><td>기능 / 로그인 / 정상흐름 / 001번</td></tr>
        <tr><td>COMP-DEVICE-BV-032</td><td>호환성 / 디바이스 / 경계값 / 032번</td></tr>
        <tr><td>PAY-BILLING-INT-015</td><td>결제 / 빌링 / 연동 / 015번</td></tr>
        <tr><td>FUN-BATTLE-CC-008</td><td>기능 / 전투 / 동시성 / 008번</td></tr>
      </table>
    </div>
    <div>
      <h4>TC 버전 관리 (Semantic Versioning)</h4>
      <table>
        <tr><th>버전</th><th>형식</th><th class="acc">트리거 조건</th></tr>
        <tr><td><strong>Major</strong></td><td>X.0.0</td><td>게임 버전 업데이트 또는 전면 개편</td></tr>
        <tr><td><strong>Minor</strong></td><td>x.X.0</td><td>신규 기능 추가 또는 TC 신규 등록</td></tr>
        <tr><td><strong>Patch</strong></td><td>x.x.X</td><td>기존 TC 내용 수정 (오탈자, 기준값 변경)</td></tr>
      </table>
      <div class="note">버전 없이 TC 수정 시 이력 추적 불가 → 회귀 커버리지 단절. Phase 1 분류 코드 소급 시 ID·버전 체계 동시 정비.</div>
    </div>
  </div>
</div>`);

/* 7 TC 라이프사이클 */
add("TC 라이프사이클",`<div class="slide">
  ${band("TC Lifecycle")}
  <span class="eyebrow">DRAFT → ARCHIVED · 6단계 + 승인 프로세스</span>
  <h2 class="title">TC는 <em>6단계</em>로 관리된다</h2>
  <div class="codeblk">DRAFT → REVIEW → APPROVED → ACTIVE → DEPRECATED → ARCHIVED</div>
  <table>
    <tr><th>상태</th><th class="acc">정의·전환 조건</th></tr>
    <tr><td><strong>DRAFT</strong></td><td>QA 담당자 작성 중</td></tr>
    <tr><td><strong>REVIEW</strong></td><td>리뷰어 지정, 승인 대기</td></tr>
    <tr><td><strong>APPROVED</strong></td><td>리드 QA 승인 완료 — 사용 가능</td></tr>
    <tr><td><strong>ACTIVE</strong></td><td>현재 테스트 실행 중</td></tr>
    <tr><td><strong>DEPRECATED</strong></td><td>기능 삭제·변경으로 무효 — 즉시 전환 의무</td></tr>
    <tr><td><strong>ARCHIVED</strong></td><td>보관 (이력 추적용, 서비스 버전 종료 시)</td></tr>
  </table>
  <div class="cols">
    <div><h4>TC 승인 프로세스 4단계</h4>
      <ol style="margin:5px 0 0 16px;list-style:decimal;">
        <li style="padding-left:4px;margin-bottom:5px;color:#3a342e;">QA 담당자 — DRAFT 작성</li>
        <li style="padding-left:4px;margin-bottom:5px;color:#3a342e;">JIRA/TestRail에서 REVIEW 전환 + 리뷰어 지정</li>
        <li style="padding-left:4px;margin-bottom:5px;color:#3a342e;">리드 QA — <strong>SMART 원칙</strong> 검토 (독립성·재현성·명확성·원자성·추적성)</li>
        <li style="padding-left:4px;margin-bottom:5px;color:#3a342e;">승인→APPROVED / 반려→수정 후 재검토</li>
      </ol></div>
    <div><h4>주의 사항</h4>
      <ul>
        <li>DEPRECATED 생략하고 ARCHIVED 이동 시 기능 변경 이력 단절</li>
        <li>반드시 DEPRECATED 경유 후 ARCHIVED</li>
        <li>TC 유효율 = ACTIVE 상태 비율 → ≥80% 유지 목표</li>
      </ul></div>
